<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0f1a">
    <title>DLS26 | Command Center Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #0a0f1a; font-family: 'DM Sans', sans-serif; color: white; overflow-x: hidden; scroll-behavior: smooth; }
        .outfit { font-family: 'Outfit', sans-serif; }
        
        .glass-card { 
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%); 
            border: 1px solid rgba(0, 255, 133, 0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .nav-active { color: #00ff85 !important; background: rgba(0, 255, 133, 0.08); border-top: 2px solid #00ff85; }
        [x-cloak] { display: none !important; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .active-md { background: #00ff85; color: #0a0f1a; box-shadow: 0 0 15px rgba(0, 255, 133, 0.3); }

        /* FIXED TABLE - NO SCROLL */
        .table-compact { table-layout: fixed; width: 100%; }
        .col-pos { width: 22px; text-align: center; font-size: 9px; }
        .col-club { width: auto; overflow: hidden; }
        .col-stat { width: 20px; text-align: center; font-size: 9px; color: rgba(255,255,255,0.6); }
        .col-pts { width: 26px; text-align: center; font-weight: 900; color: #00ff85; font-size: 10px; }

        .logo-circle-md { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: #1a2333; }
        .logo-circle-sm { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; }

        .fade-in-scroll { opacity: 0; transform: translateY(15px); transition: all 0.5s ease-out; }
        .fade-in-scroll.visible { opacity: 1; transform: translateY(0); }

        .form-box { width: 18px; height: 18px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; }
        .form-w { background: #00ff85; color: #0a0f1a; }
        .form-d { background: #ffcc00; color: #0a0f1a; }
        .form-l { background: #ff4d4d; color: white; }
    </style>
</head>
<body x-data="leagueApp()" x-init="init()" class="pb-24">

    <header class="bg-[#0a0f1a] border-b border-[#00ff8526] sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <template x-if="view !== 'lobby'">
                    <button @click="view = 'lobby'" class="mr-2 text-white/40">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                </template>
                <div class="leading-none">
                    <span class="outfit text-white text-xl font-900 tracking-tighter uppercase">DLS<span class="text-[#00ff85]">26</span></span>
                    <span class="block text-[8px] tracking-[0.3em] font-bold text-[#00ff85] opacity-80 uppercase" x-text="view === 'lobby' ? 'Network Lobby' : 'Sector Control'"></span>
                </div>
            </div>
            <div class="flex items-center space-x-2">
                <template x-if="isAdmin">
                    <span class="text-[8px] bg-red-500/20 text-red-500 px-2 py-1 rounded font-black uppercase">Admin Mode</span>
                </template>
                <img :src="profile.team_logo || 'https://via.placeholder.com/50'" class="w-8 h-8 rounded-full border border-[#00ff8533]">
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 pt-6">

        <div x-show="view === 'lobby'" x-transition x-cloak>
            <h2 class="outfit font-900 text-2xl uppercase tracking-tighter mb-6 text-center">Active <span class="text-[#00ff85]">Sectors</span></h2>
            <template x-if="activeLeague">
                <div class="glass-card rounded-3xl p-8 relative overflow-hidden">
                    <div class="flex flex-col items-center text-center">
                        <img src="https://www.premierleague.com/resources/rebrand/v7.131.1/i/elements/pl-main-logo.png" class="w-16 h-16 mb-4">
                        <h3 class="outfit font-900 text-3xl uppercase tracking-tight" x-text="activeLeague.name"></h3>
                        <p class="text-[#00ff85] font-black text-xs tracking-[0.3em] mb-6">SEASON <span x-text="activeLeague.season_number"></span></p>
                        
                        <div class="w-full grid grid-cols-2 gap-4 border-y border-white/5 py-6 mb-8">
                            <div class="text-left">
                                <p class="text-[9px] text-white/30 uppercase font-black">Capacity</p>
                                <p class="text-xl font-bold outfit"><span x-text="standings.length"></span> <span class="text-white/20">/</span> 10</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] text-white/30 uppercase font-black">Status</p>
                                <p class="text-xl font-bold outfit uppercase text-[#00ff85]" x-text="activeLeague.status"></p>
                            </div>
                        </div>
                        
                        <button @click="enterLeague()" class="w-full py-4 bg-[#00ff85] text-[#0a0f1a] rounded-xl outfit font-900 uppercase tracking-widest hover:scale-[1.02] transition-transform">
                            ENTER PROTOCOL
                        </button>
                    </div>
                </div>
            </template>
        </div>

        <div x-show="view !== 'lobby' && view !== 'admin'" x-transition x-cloak>
            
            <div x-show="view === 'home'" class="fade-in-scroll">
                <h2 class="outfit font-900 text-xl uppercase mb-4">Live <span class="text-[#00ff85]">Standings</span></h2>
                <div class="glass-card rounded-2xl overflow-hidden">
                    <table class="table-compact text-left">
                        <thead class="bg-black/40 border-b border-white/5 text-[8px] uppercase text-white/30 font-bold">
                            <tr>
                                <th class="py-3 pl-3 col-pos">#</th>
                                <th class="py-3 pl-2 col-club">CLUB</th>
                                <th class="col-stat">MP</th>
                                <th class="col-stat">W</th>
                                <th class="col-stat">D</th>
                                <th class="col-stat">L</th>
                                <th class="col-stat">GS</th>
                                <th class="col-stat">GA</th>
                                <th class="col-stat">GD</th>
                                <th class="col-pts">PTS</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-white/5 text-[10px]">
                            <template x-for="(team, index) in standings" :key="index">
                                <tr :class="team.name === userTeam ? 'bg-[#00ff8515]' : ''" class="h-14">
                                    <td class="pl-3 font-bold text-white/20" x-text="index + 1"></td>
                                    <td class="pl-2">
                                        <div class="flex items-center space-x-2 overflow-hidden">
                                            <img :src="team.logo" class="logo-circle-sm">
                                            <span class="font-bold uppercase truncate" x-text="team.name"></span>
                                        </div>
                                    </td>
                                    <td class="col-stat" x-text="team.played"></td>
                                    <td class="col-stat" x-text="team.won"></td>
                                    <td class="col-stat" x-text="team.drawn"></td>
                                    <td class="col-stat" x-text="team.lost"></td>
                                    <td class="col-stat" x-text="team.gs"></td>
                                    <td class="col-stat" x-text="team.ga"></td>
                                    <td class="col-stat font-bold" :class="team.gd >= 0 ? 'text-white/40' : 'text-red-400'" x-text="team.gd"></td>
                                    <td class="col-pts" x-text="team.points"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>

            <div x-show="view === 'fixtures'" class="fade-in-scroll">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="outfit font-900 text-xl uppercase">Matchday <span class="text-[#00ff85]" x-text="currentMatchday"></span></h2>
                </div>
                <div class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 py-2">
                    <template x-for="n in 15">
                        <button @click="currentMatchday = n; fetchFixtures()" 
                                :class="currentMatchday === n ? 'active-md' : 'bg-white/5 text-white/40'"
                                class="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase flex-shrink-0 border border-white/5" x-text="'MD ' + n"></button>
                    </template>
                </div>
                <div class="space-y-3">
                    <template x-for="match in fixtures" :key="match.id">
                        <div @click="if(isAdmin) { selectedMatch = match; view = 'admin'; }"
                             :class="isAdmin ? 'cursor-pointer hover:border-[#00ff85]' : ''"
                             class="glass-card p-4 rounded-xl flex items-center justify-between border-l-4 border-[#00ff85] transition-all">
                            <div class="flex flex-col items-center w-1/3">
                                <img :src="match.home_logo" class="logo-circle-md mb-2">
                                <span class="text-[9px] font-bold uppercase text-center truncate w-full" x-text="match.home_team"></span>
                            </div>
                            <div class="text-center">
                                <span class="text-white/20 text-[8px] font-black block uppercase mb-1" x-text="match.match_date || 'LEG 1'"></span>
                                <div class="bg-black/40 px-3 py-1 rounded border border-white/5">
                                    <span class="text-[#00ff85] text-[10px] font-black">VS</span>
                                </div>
                            </div>
                            <div class="flex flex-col items-center w-1/3">
                                <img :src="match.away_logo" class="logo-circle-md mb-2">
                                <span class="text-[9px] font-bold uppercase text-center truncate w-full" x-text="match.away_team"></span>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="view === 'insights'" class="fade-in-scroll">
                <h2 class="outfit font-900 text-xl uppercase mb-6">Tactical <span class="text-[#00ff85]">Insights</span></h2>
                
                <div class="glass-card rounded-3xl p-6 mb-4">
                    <p class="text-[10px] uppercase font-black text-white/40 mb-4 tracking-widest">Recent Form</p>
                    <div class="flex space-x-2">
                        <template x-for="(f, i) in userForm">
                            <div :class="[f === 'W' ? 'form-w' : f === 'D' ? 'form-d' : 'form-l', i === userForm.length-1 ? 'w-8 h-8' : 'w-6 h-6 opacity-50']" 
                                 class="rounded flex items-center justify-center font-black text-[10px]" x-text="f"></div>
                        </template>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="glass-card p-5 rounded-2xl border-l-2 border-[#00ff85]">
                        <p class="text-[9px] font-black text-white/30 uppercase mb-1">Biggest Win</p>
                        <p class="text-xl font-black text-[#00ff85]" x-text="stats.biggestWin"></p>
                    </div>
                    <div class="glass-card p-5 rounded-2xl border-l-2 border-red-500">
                        <p class="text-[9px] font-black text-white/30 uppercase mb-1">Biggest Loss</p>
                        <p class="text-xl font-black text-red-500" x-text="stats.biggestLoss"></p>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass-card p-5 rounded-2xl">
                        <p class="text-[9px] font-black text-white/30 uppercase">Goals Scored</p>
                        <p class="text-2xl font-black" x-text="stats.totalGS"></p>
                    </div>
                    <div class="glass-card p-5 rounded-2xl">
                        <p class="text-[9px] font-black text-white/30 uppercase">Goals Conceded</p>
                        <p class="text-2xl font-black" x-text="stats.totalGA"></p>
                    </div>
                </div>
            </div>

            <div x-show="view === 'profile'" class="fade-in-scroll">
                <div class="glass-card rounded-3xl p-8 mb-6 text-center">
                    <div class="relative inline-block mb-4">
                        <img :src="profile.team_logo || 'https://via.placeholder.com/100'" class="w-24 h-24 rounded-full border-2 border-[#00ff85] p-1 object-cover">
                        <label class="absolute bottom-0 right-0 bg-[#00ff85] p-2 rounded-full text-[#0a0f1a] cursor-pointer">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M4 5a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2V7a2 2 0 00-2-2h-1.586a1 1 0 01-.707-.293l-1.121-1.121A2 2 0 0011.172 3H8.828a2 2 0 00-1.414.586L6.293 4.707A1 1 0 015.586 5H4zm6 9a3 3 0 100-6 3 3 0 000 6z"/></svg>
                            <input type="file" @change="uploadLogo" class="hidden">
                        </label>
                    </div>
                    <h2 class="outfit font-900 text-2xl uppercase" x-text="profile.team_name"></h2>
                    <p class="text-[#00ff85] text-[10px] font-black tracking-widest mb-6" x-text="profile.email"></p>
                    
                    <div class="flex justify-center space-x-2 mb-8">
                        <template x-for="f in userForm">
                            <div :class="f === 'W' ? 'form-w' : f === 'D' ? 'form-d' : 'form-l'" class="form-box" x-text="f"></div>
                        </template>
                    </div>

                    <div class="grid grid-cols-1 gap-3">
                        <div class="bg-white/5 rounded-xl p-4 flex justify-between items-center border border-white/5">
                            <span class="text-[10px] font-black uppercase text-white/30">Phone Sync</span>
                            <span class="text-xs font-bold" x-text="profile.phone || 'N/A'"></span>
                        </div>
                    </div>

                    <button @click="logout()" class="w-full mt-8 py-4 bg-red-500/10 border border-red-500/20 text-red-500 rounded-xl font-900 uppercase text-[10px] tracking-widest">TERMINATE SESSION</button>
                </div>
            </div>

            <div x-show="view === 'results'" class="fade-in-scroll">
                <h2 class="outfit font-900 text-xl uppercase mb-4">Match <span class="text-[#00ff85]">Archives</span></h2>
                <div class="space-y-3">
                    <template x-for="res in results" :key="res.id">
                        <div class="glass-card p-4 rounded-xl flex items-center justify-between">
                            <div class="flex items-center space-x-3 w-1/3">
                                <img :src="res.home_logo" class="logo-circle-sm">
                                <span class="text-[9px] font-bold uppercase truncate" x-text="res.home_name"></span>
                            </div>
                            <div class="bg-[#00ff851a] px-3 py-1 rounded border border-[#00ff8533]">
                                <span class="text-[#00ff85] font-black text-xs" x-text="res.h_score + ' - ' + res.a_score"></span>
                            </div>
                            <div class="flex items-center space-x-3 w-1/3 justify-end">
                                <span class="text-[9px] font-bold uppercase truncate text-right" x-text="res.away_name"></span>
                                <img :src="res.away_logo" class="logo-circle-sm">
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <div x-show="view === 'admin'" x-transition x-cloak class="max-w-md mx-auto">
            <div class="flex items-center justify-between mb-8">
                <h2 class="outfit font-900 text-xl uppercase text-red-500">Result <span class="text-white">Protocol</span></h2>
                <button @click="view = 'fixtures'" class="text-[10px] font-black uppercase text-white/30">Abort</button>
            </div>

            <template x-if="selectedMatch">
                <div class="glass-card rounded-3xl p-8 border-red-500/30">
                    <div class="flex justify-between items-center mb-10">
                        <div class="text-center w-1/3">
                            <img :src="selectedMatch.home_logo" class="w-16 h-16 rounded-full mx-auto mb-3 border-2 border-white/10">
                            <p class="text-[10px] font-black uppercase truncate" x-text="selectedMatch.home_team"></p>
                        </div>
                        <div class="flex items-center space-x-2">
                            <input type="number" x-model="adminForm.h_score" class="w-12 h-12 bg-white/5 border border-white/10 rounded-xl text-center font-black text-xl text-[#00ff85] outline-none focus:border-[#00ff85]">
                            <span class="text-white/20">:</span>
                            <input type="number" x-model="adminForm.a_score" class="w-12 h-12 bg-white/5 border border-white/10 rounded-xl text-center font-black text-xl text-[#00ff85] outline-none focus:border-[#00ff85]">
                        </div>
                        <div class="text-center w-1/3">
                            <img :src="selectedMatch.away_logo" class="w-16 h-16 rounded-full mx-auto mb-3 border-2 border-white/10">
                            <p class="text-[10px] font-black uppercase truncate" x-text="selectedMatch.away_team"></p>
                        </div>
                    </div>
                    <button @click="submitAdminResult()" class="w-full py-4 bg-red-600 text-white rounded-xl outfit font-900 uppercase tracking-widest text-sm shadow-xl">
                        CONFIRM & PURGE FIXTURE
                    </button>
                </div>
            </template>
        </div>

    </main>

    <nav x-show="view !== 'lobby' && view !== 'admin'" class="fixed bottom-0 left-0 right-0 bg-[#0a0f1a] border-t border-white/5 flex justify-around p-2 pb-6 backdrop-blur-lg z-50">
        <button @click="view = 'home'" :class="view === 'home' ? 'nav-active' : ''" class="flex flex-col items-center p-2 rounded-xl text-white/40 w-full transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
            <span class="text-[7px] font-bold uppercase mt-1">Standings</span>
        </button>
        <button @click="view = 'fixtures'; fetchFixtures()" :class="view === 'fixtures' ? 'nav-active' : ''" class="flex flex-col items-center p-2 rounded-xl text-white/40 w-full transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[7px] font-bold uppercase mt-1">Fixtures</span>
        </button>
        <button @click="view = 'results'" :class="view === 'results' ? 'nav-active' : ''" class="flex flex-col items-center p-2 rounded-xl text-white/40 w-full transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[7px] font-bold uppercase mt-1">Results</span>
        </button>
        <button @click="view = 'insights'" :class="view === 'insights' ? 'nav-active' : ''" class="flex flex-col items-center p-2 rounded-xl text-white/40 w-full transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            <span class="text-[7px] font-bold uppercase mt-1">Insights</span>
        </button>
        <button @click="view = 'profile'" :class="view === 'profile' ? 'nav-active' : ''" class="flex flex-col items-center p-2 rounded-xl text-white/40 w-full transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-[7px] font-bold uppercase mt-1">Profile</span>
        </button>
    </nav>

    <script>
        const _supabase = supabase.createClient('https://irzgzyfscoosvixwvfhx.supabase.co', 'sb_publishable_5WjuPG6Wg96_ySp0DcDuTw_JTGWxSJh');

        function leagueApp() {
            return {
                view: 'lobby',
                isAdmin: false,
                adminId: 'c2185ce2-e803-410a-91a8-ea21aa206b98',
                activeLeague: null,
                standings: [],
                fixtures: [],
                results: [],
                userTeam: '',
                profile: { team_name: '', team_logo: '', email: '', phone: '' },
                currentMatchday: 1,
                userForm: [],
                stats: { totalGS: 0, totalGA: 0, biggestWin: '0-0', biggestLoss: '0-0' },
                selectedMatch: null,
                adminForm: { h_score: 0, a_score: 0 },

                async init() {
                    const { data: { user } } = await _supabase.auth.getUser();
                    if (!user) { window.location.href = 'signin.html'; return; }

                    if (user.id === this.adminId) this.isAdmin = true;

                    // Fetch user info specifically from userinfo table
                    const { data: userInfo } = await _supabase.from('userinfo').select('*').eq('email', user.email).maybeSingle();
                    if (userInfo) {
                        this.profile = userInfo;
                        this.userTeam = userInfo.team_name;
                    }

                    const { data: leagueData } = await _supabase.from('leagues').select('*').limit(1).single();
                    if (leagueData) this.activeLeague = leagueData;

                    await this.refreshData();
                    this.initScroll();
                },

                async refreshData() {
                    const { data: standData } = await _supabase.from('standings').select('*').order('points', { ascending: false }).order('gd', { ascending: false });
                    if (standData) {
                        this.standings = standData.map(i => ({ 
                            name: i.team_name, logo: i.logo_url, played: i.played || 0, won: i.won || 0,
                            drawn: i.drawn || 0, lost: i.lost || 0, gs: i.gs || 0, ga: i.ga || 0, gd: i.gd || 0, points: i.points || 0 
                        }));
                    }

                    const { data: resData } = await _supabase.from('results').select('*').order('created_at', { ascending: false });
                    if (resData) {
                        this.results = resData;
                        this.calculateTactics();
                    }
                },

                enterLeague() {
                    this.view = 'home';
                    this.fetchFixtures();
                },

                async fetchFixtures() {
                    const { data } = await _supabase.from('fixtures').select('*').eq('matchday', this.currentMatchday).order('match_date', { ascending: true });
                    if (data) this.fixtures = data;
                },

                calculateTactics() {
                    let gs = 0, ga = 0, form = [];
                    let maxWin = -1, maxLoss = -1;
                    let bwStr = "0-0", blStr = "0-0";

                    this.results.forEach(r => {
                        let isHome = r.home_name === this.userTeam;
                        let isAway = r.away_name === this.userTeam;

                        if (isHome || isAway) {
                            let my = isHome ? r.h_score : r.a_score;
                            let op = isHome ? r.a_score : r.h_score;
                            let diff = my - op;

                            gs += my; ga += op;

                            if (diff > maxWin) { maxWin = diff; bwStr = `${my}-${op}`; }
                            if (diff < maxLoss) { maxLoss = diff; blStr = `${my}-${op}`; }

                            if (form.length < 5) form.push(my > op ? 'W' : my === op ? 'D' : 'L');
                        }
                    });

                    this.stats.totalGS = gs;
                    this.stats.totalGA = ga;
                    this.stats.biggestWin = bwStr;
                    this.stats.biggestLoss = blStr;
                    this.userForm = form.reverse();
                },

                async submitAdminResult() {
                    if (!this.isAdmin) return;
                    const m = this.selectedMatch;
                    const hS = parseInt(this.adminForm.h_score);
                    const aS = parseInt(this.adminForm.a_score);

                    try {
                        // 1. Insert into Results
                        await _supabase.from('results').insert([{
                            home_name: m.home_team, home_logo: m.home_logo,
                            away_name: m.away_team, away_logo: m.away_logo,
                            h_score: hS, a_score: aS, matchday: m.matchday
                        }]);

                        // 2. Update Standing Logic
                        await this.updateStats(m.home_team, hS, aS);
                        await this.updateStats(m.away_team, aS, hS);

                        // 3. Purge Fixture
                        await _supabase.from('fixtures').delete().eq('id', m.id);

                        // 4. Reset UI
                        this.view = 'fixtures';
                        await this.refreshData();
                        await this.fetchFixtures();
                    } catch (e) {
                        alert("Logic Error: Purge failed.");
                    }
                },

                async updateStats(tName, gs, ga) {
                    const { data: cur } = await _supabase.from('standings').select('*').eq('team_name', tName).single();
                    let win = gs > ga ? 1 : 0;
                    let draw = gs === ga ? 1 : 0;
                    let pts = (win * 3) + (draw * 1);

                    await _supabase.from('standings').update({
                        played: (cur.played || 0) + 1,
                        won: (cur.won || 0) + win,
                        drawn: (cur.drawn || 0) + draw,
                        lost: (cur.lost || 0) + (gs < ga ? 1 : 0),
                        gs: (cur.gs || 0) + gs,
                        ga: (cur.ga || 0) + ga,
                        gd: (cur.gd || 0) + (gs - ga),
                        points: (cur.points || 0) + pts
                    }).eq('team_name', tName);
                },

                async uploadLogo(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const name = `${Date.now()}_logo`;
                    const { data } = await _supabase.storage.from('avatars').upload(name, file);
                    if (data) {
                        const url = `https://irzgzyfscoosvixwvfhx.supabase.co/storage/v1/object/public/avatars/${name}`;
                        await _supabase.from('userinfo').update({ team_logo: url }).eq('email', this.profile.email);
                        this.profile.team_logo = url;
                    }
                },

                initScroll() {
                    const obs = new IntersectionObserver((es) => {
                        es.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
                    }, { threshold: 0.1 });
                    document.querySelectorAll('.fade-in-scroll').forEach(el => obs.observe(el));
                },

                async logout() {
                    await _supabase.auth.signOut();
                    window.location.href = 'signin.html';
                }
            }
        }
    </script>
</body>
</html>
