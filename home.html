<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0f1a">
    <title>DLS26 | Premier League Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --midnight: #0a0f1a;
            --emerald: #00ff85;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(0, 255, 133, 0.15);
        }
        body { 
            font-family: 'DM Sans', sans-serif; 
            background-color: var(--midnight); 
            color: white; 
            overflow-x: hidden; 
        }
        .outfit { font-family: 'Outfit', sans-serif; }
        
        /* Background Glows */
        .glow {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 133, 0.05) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* Glassmorphism Elements */
        .glass-card {
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        /* Navigation Styling */
        .nav-active { 
            color: var(--emerald) !important; 
            background: rgba(0, 255, 133, 0.08);
            border-top: 2px solid var(--emerald);
        }
        
        /* Table Formatting */
        .stat-col { width: 30px; text-align: center; font-size: 10px; font-weight: 700; }
        .team-row:hover { background: rgba(0, 255, 133, 0.03); }
        
        [x-cloak] { display: none !important; }

        /* Drawer Transition */
        .drawer-open { transform: translateX(0%); }
        .drawer-closed { transform: translateX(100%); }
    </style>
</head>
<body x-data="leagueApp()" x-init="init()" class="pb-24">

    <div class="glow top-[-10%] right-[-10%]"></div>
    <div class="glow bottom-[-10%] left-[-10%]"></div>

    <header class="bg-[#0a0f1a] border-b border-[#00ff8526] sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-[#00ff85] p-1.5 rounded-lg shadow-[0_0_15px_rgba(0,255,133,0.4)]">
                    <svg class="w-5 h-5 text-[#0a0f1a]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <div class="leading-none">
                    <span class="outfit text-white text-xl font-900 tracking-tighter uppercase">DLS<span class="text-[#00ff85]">26</span></span>
                    <span class="block text-[8px] tracking-[0.3em] font-bold text-[#00ff85] opacity-80 uppercase">Infrastructure</span>
                </div>
            </div>
            
            <button @click="menuOpen = true" class="p-2 hover:bg-[#00ff851a] rounded-xl transition-all">
                <svg class="w-6 h-6 text-[#00ff85]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M8 12h12M4 18h16"></path>
                </svg>
            </button>
        </div>
    </header>

    <div x-show="menuOpen" class="fixed inset-0 z-[100]" x-cloak>
        <div @click="menuOpen = false" class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div class="absolute right-0 top-0 bottom-0 w-72 bg-[#0d1321] border-l border-[#00ff8526] p-8 transition-transform duration-300 shadow-2xl"
             :class="menuOpen ? 'drawer-open' : 'drawer-closed'">
            <div class="flex justify-between items-center mb-12">
                <span class="outfit font-900 text-xl uppercase tracking-widest text-[#00ff85]">System</span>
                <button @click="menuOpen = false" class="text-white/40 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <nav class="space-y-8">
                <a href="profile.html" class="flex items-center space-x-4 group text-white/70 hover:text-[#00ff85] transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <span class="font-bold text-sm uppercase tracking-widest">Profile</span>
                </a>
                <a href="tournaments.html" class="flex items-center space-x-4 group text-white/70 hover:text-[#00ff85] transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12z"></path></svg>
                    <span class="font-bold text-sm uppercase tracking-widest">Tournaments</span>
                </a>
                <div class="pt-8 border-t border-white/5">
                    <button @click="logout()" class="flex items-center space-x-4 text-red-500/80 hover:text-red-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                        <span class="font-bold text-sm uppercase tracking-widest">Terminate Session</span>
                    </button>
                </div>
            </nav>
        </div>
    </div>

    <main class="max-w-4xl mx-auto p-4">

        <div x-show="view === 'home'" x-transition x-cloak>
            <div class="flex items-center justify-between mb-4 px-1">
                <h2 class="outfit font-900 text-xl uppercase tracking-tighter">League <span class="text-[#00ff85]">Analytics</span></h2>
                <span class="text-[9px] border border-[#00ff854d] text-[#00ff85] px-3 py-1 rounded-full font-bold uppercase tracking-widest">Season 26.0</span>
            </div>
            
            <div class="glass-card rounded-2xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-black/40 border-b border-white/5 text-[#5a6477] font-bold text-[9px] uppercase tracking-widest">
                            <tr>
                                <th class="py-4 px-2 text-center">#</th>
                                <th class="py-4 text-left">Club Identity</th>
                                <th class="stat-col">MP</th>
                                <th class="stat-col">W</th>
                                <th class="stat-col">D</th>
                                <th class="stat-col">L</th>
                                <th class="stat-col text-[#00ff85]">PTS</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-white/5">
                            <template x-for="(team, index) in standings" :key="index">
                                <tr class="team-row transition-colors">
                                    <td class="py-4 text-center text-white/30 text-[10px]" x-text="index + 1"></td>
                                    <td class="py-4 flex items-center space-x-3">
                                        <div class="w-6 h-6 rounded-full bg-white/5 p-1 border border-white/10">
                                            <img :src="team.logo" class="w-full h-full object-contain">
                                        </div>
                                        <span class="text-[11px] font-bold uppercase tracking-tight text-white/90" x-text="team.name"></span>
                                    </td>
                                    <td class="text-center text-white/50 text-[11px]" x-text="team.played"></td>
                                    <td class="text-center text-white/50 text-[11px]" x-text="team.won"></td>
                                    <td class="text-center text-white/50 text-[11px]" x-text="team.drawn"></td>
                                    <td class="text-center text-white/50 text-[11px]" x-text="team.lost"></td>
                                    <td class="text-center font-black text-[#00ff85] text-[12px] bg-[#00ff8505]" x-text="team.points"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div x-show="view === 'fixtures'" x-transition x-cloak>
            <h2 class="outfit font-900 text-xl uppercase tracking-tighter mb-4 px-1">Scheduled <span class="text-[#00ff85]">Protocols</span></h2>
            <div class="grid grid-cols-1 gap-4">
                <template x-for="match in fixtures">
                    <div class="glass-card p-5 rounded-2xl flex items-center justify-between border-l-4 border-l-[#00ff85]">
                        <div class="flex items-center space-x-3 w-2/5">
                            <img :src="match.home_logo" class="w-7 h-7">
                            <span class="text-[10px] font-bold uppercase tracking-tight" x-text="match.home_name"></span>
                        </div>
                        <div class="text-center bg-black/40 px-4 py-2 rounded-xl border border-white/5">
                            <div class="text-[#00ff85] text-[11px] font-black" x-text="match.time"></div>
                            <div class="text-[8px] font-bold text-white/30 uppercase mt-1" x-text="match.date"></div>
                        </div>
                        <div class="flex items-center space-x-3 justify-end w-2/5 text-right">
                            <span class="text-[10px] font-bold uppercase tracking-tight" x-text="match.away_name"></span>
                            <img :src="match.away_logo" class="w-7 h-7">
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="view === 'results'" x-transition x-cloak>
            <h2 class="outfit font-900 text-xl uppercase tracking-tighter mb-4 px-1">Confirmed <span class="text-[#00ff85]">Data</span></h2>
            <div class="glass-card rounded-2xl overflow-hidden divide-y divide-white/5">
                <template x-for="res in results">
                    <div class="flex items-center justify-between p-5 hover:bg-white/[0.02]">
                        <div class="flex items-center space-x-3 w-2/5">
                            <img :src="res.home_logo" class="w-6 h-6">
                            <span class="text-[10px] font-bold uppercase tracking-tight" x-text="res.home_name"></span>
                        </div>
                        <div class="flex items-center space-x-2 bg-[#00ff851a] px-3 py-1 rounded-lg border border-[#00ff854d]">
                            <span class="text-[#00ff85] font-black text-xs" x-text="res.h_score"></span>
                            <span class="text-white/20 text-[9px]">:</span>
                            <span class="text-[#00ff85] font-black text-xs" x-text="res.a_score"></span>
                        </div>
                        <div class="flex items-center space-x-3 justify-end w-2/5 text-right">
                            <span class="text-[10px] font-bold uppercase tracking-tight" x-text="res.away_name"></span>
                            <img :src="res.away_logo" class="w-6 h-6">
                        </div>
                    </div>
                </template>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0a0f1a] border-t border-white/5 flex justify-around p-2 pb-6 backdrop-blur-lg z-50">
        <button @click="view = 'home'" :class="view === 'home' ? 'nav-active' : ''" class="flex flex-col items-center p-3 rounded-xl text-white/40 w-full transition-all active:scale-90">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
            <span class="text-[8px] font-bold uppercase mt-1.5 tracking-widest">Table</span>
        </button>
        <button @click="view = 'fixtures'" :class="view === 'fixtures' ? 'nav-active' : ''" class="flex flex-col items-center p-3 rounded-xl text-white/40 w-full transition-all active:scale-90">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[8px] font-bold uppercase mt-1.5 tracking-widest">Fixtures</span>
        </button>
        <button @click="view = 'results'" :class="view === 'results' ? 'nav-active' : ''" class="flex flex-col items-center p-3 rounded-xl text-white/40 w-full transition-all active:scale-90">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[8px] font-bold uppercase mt-1.5 tracking-widest">Results</span>
        </button>
        <button @click="view = 'insights'" :class="view === 'insights' ? 'nav-active' : ''" class="flex flex-col items-center p-3 rounded-xl text-white/40 w-full transition-all active:scale-90">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            <span class="text-[8px] font-bold uppercase mt-1.5 tracking-widest">Growth</span>
        </button>
    </nav>

    <script>
        const supabaseUrl = 'https://irzgzyfscoosvixwvfhx.supabase.co'; 
        const supabaseKey = 'sb_publishable_5WjuPG6Wg96_ySp0DcDuTw_JTGWxSJh'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function leagueApp() {
            return {
                view: 'home',
                menuOpen: false,
                standings: [],
                fixtures: [
                    { home_name: 'Mbarara XI', home_logo: 'https://bit.ly/3R8O4K1', away_name: 'Gulu City', away_logo: 'https://bit.ly/3S6fG2N', time: '19:00', date: 'SAT 04 APR' }
                ],
                results: [
                    { home_name: 'Arsenal UG', home_logo: 'https://bit.ly/3S6fG2N', away_name: 'Kla Kings', away_logo: 'https://bit.ly/3R8O4K1', h_score: 2, a_score: 1 }
                ],

                async init() {
                    const { data, error } = await _supabase
                        .from('standings')
                        .select('*')
                        .order('points', { ascending: false });

                    if (data) {
                        this.standings = data.map(item => ({
                            name: item.team_name,
                            logo: item.logo_url,
                            played: item.played,
                            won: item.won,
                            drawn: item.drawn,
                            lost: item.lost,
                            points: item.points
                        }));
                    }
                },

                async logout() {
                    await _supabase.auth.signOut();
                    window.location.href = 'signin.html';
                }
            }
        }
    </script>
</body>
</html>
