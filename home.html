<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS Premier League | Player Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --epl-purple: #3d195b;
            --epl-green: #00ff85;
            --epl-dark-purple: #340040;
        }
        body { font-family: 'Outfit', sans-serif; background-color: #f0f0f0; color: var(--epl-purple); overflow-x: hidden; }
        .bebas { font-family: 'Bebas Neue', cursive; letter-spacing: 1px; }
        .epl-purple { background-color: var(--epl-purple); }
        .epl-green { background-color: var(--epl-green); }
        .text-epl-green { color: var(--epl-green); }
        .bg-epl-gradient { background: linear-gradient(135deg, var(--epl-purple) 0%, #762291 100%); }
        
        /* Condensed Table Styles */
        .stat-col { width: 24px; text-align: center; font-size: 9px; }
        .team-col { min-width: 80px; }
        
        /* Nav Animation */
        .nav-active { border-top: 3px solid var(--epl-green); color: var(--epl-green) !important; background: rgba(0, 255, 133, 0.05); }
        
        /* Custom DLS Font Mockup */
        .dls-brand { font-family: 'Arial Black', sans-serif; font-style: italic; letter-spacing: -2px; }
        
        [x-cloak] { display: none !important; }
        
        /* Drawer Transition */
        .drawer-open { transform: translateX(0%); }
        .drawer-closed { transform: translateX(100%); }
    </style>
</head>
<body x-data="leagueApp()" x-init="init()" class="pb-24">

    <header class="epl-purple text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-3 py-3 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <img src="https://www.premierleague.com/resources/rebrand/v7.131.1/i/elements/pl-main-logo.png" alt="EPL" class="w-8 h-8">
                <div class="leading-none">
                    <span class="dls-brand text-epl-green text-lg font-black italic">DLS</span>
                    <span class="block text-[8px] tracking-[0.2em] font-bold opacity-90 uppercase bebas">Premier League</span>
                </div>
            </div>
            
            <button @click="menuOpen = true" class="p-1 hover:bg-white/10 rounded-lg transition-transform active:scale-90">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M8 12h12M4 18h16"></path>
                </svg>
            </button>
        </div>
    </header>

    <div x-show="menuOpen" class="fixed inset-0 z-[100]" x-cloak>
        <div @click="menuOpen = false" class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity"></div>
        <div class="absolute right-0 top-0 bottom-0 w-64 bg-epl-dark-purple text-white shadow-2xl transition-transform duration-300"
             :class="menuOpen ? 'drawer-open' : 'drawer-closed'">
            <div class="p-6">
                <div class="flex justify-between items-center mb-10">
                    <span class="bebas text-2xl text-epl-green">Menu</span>
                    <button @click="menuOpen = false" class="text-white/50 hover:text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <nav class="space-y-6">
                    <a href="profile.html" class="flex items-center space-x-4 group">
                        <div class="p-2 bg-white/10 rounded-lg group-hover:bg-epl-green group-hover:text-purple-900 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </div>
                        <span class="font-bold">Profile</span>
                    </a>
                    <a href="tournaments.html" class="flex items-center space-x-4 group">
                        <div class="p-2 bg-white/10 rounded-lg group-hover:bg-epl-green group-hover:text-purple-900 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12z"></path></svg>
                        </div>
                        <span class="font-bold">Tournaments</span>
                    </a>
                    <hr class="border-white/10">
                    <button @click="logout()" class="flex items-center space-x-4 text-red-400 group w-full">
                        <div class="p-2 bg-red-400/10 rounded-lg group-hover:bg-red-500 group-hover:text-white transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                        </div>
                        <span class="font-bold">Logout</span>
                    </button>
                </nav>
            </div>
        </div>
    </div>

    <main class="max-w-4xl mx-auto p-2">

        <div x-show="view === 'home'" x-transition x-cloak>
            <div class="flex items-center justify-between px-2 mb-2">
                <h2 class="text-lg font-black italic uppercase bebas">Table Standings</h2>
                <span class="text-[9px] bg-white border border-gray-300 px-2 py-0.5 rounded-full font-bold uppercase tracking-tighter">Season 2026</span>
            </div>
            
            <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                <table class="w-full">
                    <thead class="bg-gray-50 border-b border-gray-200 text-gray-400 font-bold text-[8px] uppercase tracking-tighter">
                        <tr>
                            <th class="py-2 px-1 text-center">#</th>
                            <th class="py-2 text-left team-col">Club</th>
                            <th class="stat-col">MP</th>
                            <th class="stat-col">W</th>
                            <th class="stat-col">D</th>
                            <th class="stat-col">L</th>
                            <th class="stat-col">GS</th>
                            <th class="stat-col">GA</th>
                            <th class="stat-col">GD</th>
                            <th class="stat-col bg-purple-50 text-purple-900 font-black">PTS</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <template x-for="(team, index) in standings" :key="index">
                            <tr class="text-[10px] font-bold">
                                <td class="py-3 text-center text-gray-400" x-text="index + 1"></td>
                                <td class="py-3 flex items-center space-x-1.5 team-col">
                                    <img :src="team.logo" class="w-4 h-4 object-contain">
                                    <span class="text-purple-900 truncate uppercase" x-text="team.name"></span>
                                </td>
                                <td class="text-center text-gray-500" x-text="team.played"></td>
                                <td class="text-center text-gray-500" x-text="team.won"></td>
                                <td class="text-center text-gray-500" x-text="team.drawn"></td>
                                <td class="text-center text-gray-500" x-text="team.lost"></td>
                                <td class="text-center text-gray-400" x-text="team.gs"></td>
                                <td class="text-center text-gray-400" x-text="team.ga"></td>
                                <td class="text-center" x-text="team.gs - team.ga"></td>
                                <td class="text-center font-black bg-purple-50 text-purple-900" x-text="team.points"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

        <div x-show="view === 'fixtures'" x-transition x-cloak>
            <h2 class="text-lg font-black italic uppercase bebas px-2 mb-3">Next Matchdays</h2>
            <div class="space-y-2">
                <template x-for="match in fixtures">
                    <div class="bg-white p-4 rounded-xl shadow-sm flex items-center justify-between border-l-4 border-purple-800 transition-transform active:scale-95">
                        <div class="flex items-center space-x-2 w-1/3">
                            <img :src="match.home_logo" class="w-6 h-6">
                            <span class="text-[9px] font-black uppercase truncate" x-text="match.home_name"></span>
                        </div>
                        <div class="text-center">
                            <div class="bg-epl-gradient text-white text-[10px] px-3 py-0.5 rounded font-black mb-1" x-text="match.time"></div>
                            <div class="text-[8px] font-bold text-gray-400 uppercase tracking-tighter" x-text="match.date"></div>
                        </div>
                        <div class="flex items-center space-x-2 justify-end w-1/3">
                            <span class="text-[9px] font-black uppercase truncate text-right" x-text="match.away_name"></span>
                            <img :src="match.away_logo" class="w-6 h-6">
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="view === 'results'" x-transition x-cloak>
            <h2 class="text-lg font-black italic uppercase bebas px-2 mb-3 text-purple-900">Final Scores</h2>
            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <template x-for="res in results">
                    <div class="flex items-center justify-between p-4 border-b border-gray-100 hover:bg-gray-50">
                        <div class="flex items-center space-x-2 w-2/5">
                            <img :src="res.home_logo" class="w-5 h-5">
                            <span class="text-[10px] font-black uppercase truncate" x-text="res.home_name"></span>
                        </div>
                        <div class="flex space-x-0.5 bg-purple-900 p-0.5 rounded shadow-inner">
                            <span class="text-white w-6 h-6 flex items-center justify-center rounded-sm font-black text-xs" x-text="res.h_score"></span>
                            <span class="text-white/30 text-[8px] flex items-center font-bold px-0.5">:</span>
                            <span class="text-white w-6 h-6 flex items-center justify-center rounded-sm font-black text-xs" x-text="res.a_score"></span>
                        </div>
                        <div class="flex items-center space-x-2 justify-end w-2/5">
                            <span class="text-[10px] font-black uppercase truncate text-right" x-text="res.away_name"></span>
                            <img :src="res.away_logo" class="w-5 h-5">
                        </div>
                    </div>
                </template>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around p-2 shadow-[0_-5px_20px_rgba(0,0,0,0.05)] z-50">
        <button @click="view = 'home'" :class="view === 'home' ? 'nav-active' : ''" class="flex flex-col items-center p-2 rounded-lg text-gray-400 w-full transition-all active:scale-90">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            <span class="text-[8px] font-black uppercase mt-1">Standings</span>
        </button>
        <button @click="view = 'fixtures'" :class="view === 'fixtures' ? 'nav-active' : ''" class="flex flex-col items-center p-2 rounded-lg text-gray-400 w-full transition-all active:scale-90">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[8px] font-black uppercase mt-1">Fixtures</span>
        </button>
        <button @click="view = 'results'" :class="view === 'results' ? 'nav-active' : ''" class="flex flex-col items-center p-2 rounded-lg text-gray-400 w-full transition-all active:scale-90">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[8px] font-black uppercase mt-1">Results</span>
        </button>
        <button @click="view = 'insights'" :class="view === 'insights' ? 'nav-active' : ''" class="flex flex-col items-center p-2 rounded-lg text-gray-400 w-full transition-all active:scale-90">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            <span class="text-[8px] font-black uppercase mt-1">Insights</span>
        </button>
    </nav>

    <script>
        // Replace these with your actual Supabase details
const supabaseUrl = 'https://irzgzyfscoosvixwvfhx.supabase.co'; 
const supabaseKey = 'sb_publishable_5WjuPG6Wg96_ySp0DcDuTw_JTGWxSJh'; 
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

// Update your init() function in the HTML to pull real data:
async function init() {
    const { data, error } = await _supabase
        .from('standings')
        .select('*')
        .order('points', { ascending: false });

    if (data) {
        this.standings = data.map(item => ({
            name: item.team_name,
            logo: item.logo_url,
            played: item.played,
            won: item.won,
            drawn: item.drawn,
            lost: item.lost,
            gs: item.gs,
            ga: item.ga,
            points: item.points
        }));
    }
        }
        
        function leagueApp() {
            return {
                view: 'home',
                menuOpen: false,
                standings: [
                    { name: 'Arsenal UG', logo: 'https://bit.ly/3S6fG2N', played: 12, won: 10, drawn: 2, lost: 0, gs: 34, ga: 5, points: 32 },
                    { name: 'Kla Kings', logo: 'https://bit.ly/3R8O4K1', played: 12, won: 9, drawn: 1, lost: 2, gs: 28, ga: 12, points: 28 },
                    { name: 'Jinja Stars', logo: 'https://bit.ly/45V8X8p', played: 12, won: 7, drawn: 3, lost: 2, gs: 22, ga: 14, points: 24 }
                ],
                fixtures: [
                    { home_name: 'Mbarara XI', home_logo: 'https://bit.ly/3R8O4K1', away_name: 'Gulu City', away_logo: 'https://bit.ly/3S6fG2N', time: '19:00', date: 'SAT 04 APR' }
                ],
                results: [
                    { home_name: 'Arsenal UG', home_logo: 'https://bit.ly/3S6fG2N', away_name: 'Kla Kings', away_logo: 'https://bit.ly/3R8O4K1', h_score: 2, a_score: 1 }
                ],

                init() {
                    console.log("DLS Premier League Dashboard Initialized");
                    // Fetch from Supabase would happen here
                },

                logout() {
                    alert("Logging out...");
                    // window.location.href = 'login.html';
                }
            }
        }
    </script>
</body>
    </html>
