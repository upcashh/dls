<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0f1a">
    <title>DLS26 | Command Center</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #0a0f1a; font-family: 'DM Sans', sans-serif; color: white; overflow-x: hidden; }
        .outfit { font-family: 'Outfit', sans-serif; }
        
        .glass-card { 
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%); 
            border: 1px solid rgba(0, 255, 133, 0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .nav-active { color: #00ff85 !important; background: rgba(0, 255, 133, 0.08); border-top: 2px solid #00ff85; }
        .glow-button { shadow: 0 0 15px rgba(0, 255, 133, 0.3); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="leagueApp()" x-init="init()" class="pb-24">

    <header class="bg-[#0a0f1a] border-b border-[#00ff8526] sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <template x-if="view !== 'lobby'">
                    <button @click="view = 'lobby'" class="mr-2 text-white/40 hover:text-[#00ff85]">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                </template>
                <div class="leading-none">
                    <span class="outfit text-white text-xl font-900 tracking-tighter uppercase">DLS<span class="text-[#00ff85]">26</span></span>
                    <span class="block text-[8px] tracking-[0.3em] font-bold text-[#00ff85] opacity-80 uppercase" x-text="view === 'lobby' ? 'Network Lobby' : 'Active Sector'"></span>
                </div>
            </div>
            
            <button @click="logout()" class="p-2 bg-red-500/10 rounded-lg text-red-500 border border-red-500/20">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 pt-8">

        <div x-show="view === 'lobby'" x-transition x-cloak>
            <h2 class="outfit font-900 text-2xl uppercase tracking-tighter mb-6 px-1 text-center">Available <span class="text-[#00ff85]">Deployment</span></h2>
            
            <div @click="view = 'home'" class="glass-card rounded-3xl p-8 relative overflow-hidden group cursor-pointer hover:border-[#00ff85] transition-all duration-500">
                <div class="absolute -right-10 -top-10 w-32 h-32 bg-[#00ff85] opacity-10 blur-3xl group-hover:opacity-20 transition-opacity"></div>
                
                <div class="flex flex-col items-center text-center">
                    <div class="w-20 h-20 bg-[#00ff851a] rounded-2xl flex items-center justify-center mb-6 border border-[#00ff8533]">
                        <img src="https://www.premierleague.com/resources/rebrand/v7.131.1/i/elements/pl-main-logo.png" class="w-12 h-12 grayscale group-hover:grayscale-0 transition-all duration-500">
                    </div>
                    
                    <h3 class="outfit font-900 text-3xl uppercase tracking-tight mb-2">SEASON <span class="text-[#00ff85]">26</span></h3>
                    <div class="flex items-center space-x-3 mb-6">
                        <span class="text-[9px] bg-[#00ff85] text-[#0a0f1a] px-3 py-1 rounded-full font-black uppercase tracking-widest">Ongoing</span>
                        <span class="text-[9px] text-white/40 font-bold uppercase tracking-widest">Premier League</span>
                    </div>
                    
                    <div class="w-full grid grid-cols-3 gap-4 border-t border-white/5 pt-6">
                        <div>
                            <p class="text-[10px] text-white/30 uppercase font-black">Teams</p>
                            <p class="text-lg font-bold outfit" x-text="standings.length">0</p>
                        </div>
                        <div>
                            <p class="text-[10px] text-white/30 uppercase font-black">Status</p>
                            <p class="text-lg font-bold outfit text-[#00ff85]">ACTIVE</p>
                        </div>
                        <div>
                            <p class="text-[10px] text-white/30 uppercase font-black">Prize</p>
                            <p class="text-lg font-bold outfit">GOLD</p>
                        </div>
                    </div>
                    
                    <button class="mt-8 w-full py-4 bg-[#00ff85] text-[#0a0f1a] rounded-xl outfit font-900 uppercase tracking-widest text-sm group-hover:scale-[1.02] transition-transform">
                        ENTER PROTOCOL
                    </button>
                </div>
            </div>
        </div>

        <div x-show="view !== 'lobby'" x-transition x-cloak>
            
            <div x-show="view === 'home'">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="outfit font-900 text-xl uppercase tracking-tighter">League <span class="text-[#00ff85]">Analytics</span></h2>
                </div>
                <div class="glass-card rounded-2xl overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-black/40 border-b border-white/5 text-[#5a6477] font-bold text-[9px] uppercase tracking-widest">
                            <tr>
                                <th class="py-4 px-2 text-center">#</th>
                                <th class="py-4 text-left">Club</th>
                                <th class="text-center px-2">MP</th>
                                <th class="text-center px-2 text-[#00ff85]">PTS</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-white/5">
                            <template x-for="(team, index) in standings" :key="index">
                                <tr class="hover:bg-white/[0.02]">
                                    <td class="py-4 text-center text-white/30 text-[10px]" x-text="index + 1"></td>
                                    <td class="py-4 flex items-center space-x-3">
                                        <img :src="team.logo" class="w-5 h-5 object-contain opacity-80">
                                        <span class="text-[11px] font-bold uppercase text-white/90" x-text="team.name"></span>
                                    </td>
                                    <td class="text-center text-white/50 text-[11px]" x-text="team.played"></td>
                                    <td class="text-center font-black text-[#00ff85] text-[12px]" x-text="team.points"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>

            <div x-show="view === 'fixtures'">... Fixtures List ...</div>
            <div x-show="view === 'results'">... Results List ...</div>

        </div>

    </main>

    <nav x-show="view !== 'lobby'" class="fixed bottom-0 left-0 right-0 bg-[#0a0f1a] border-t border-white/5 flex justify-around p-2 pb-6 backdrop-blur-lg z-50">
        <button @click="view = 'home'" :class="view === 'home' ? 'nav-active' : ''" class="flex flex-col items-center p-3 rounded-xl text-white/40 w-full transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
            <span class="text-[8px] font-bold uppercase mt-1.5 tracking-widest">Table</span>
        </button>
        <button @click="view = 'fixtures'" :class="view === 'fixtures' ? 'nav-active' : ''" class="flex flex-col items-center p-3 rounded-xl text-white/40 w-full transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[8px] font-bold uppercase mt-1.5 tracking-widest">Fixtures</span>
        </button>
        <button @click="view = 'results'" :class="view === 'results' ? 'nav-active' : ''" class="flex flex-col items-center p-3 rounded-xl text-white/40 w-full transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[8px] font-bold uppercase mt-1.5 tracking-widest">Results</span>
        </button>
    </nav>

    <script>
        const supabaseUrl = 'https://irzgzyfscoosvixwvfhx.supabase.co'; 
        const supabaseKey = 'sb_publishable_5WjuPG6Wg96_ySp0DcDuTw_JTGWxSJh'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function leagueApp() {
            return {
                view: 'lobby',
                standings: [],
                
                async init() {
                    const { data: { user } } = await _supabase.auth.getUser();
                    if (!user) { window.location.href = 'signin.html'; return; }

                    // Pre-load standings data so the card shows the correct count
                    const { data } = await _supabase.from('standings').select('*').order('points', { ascending: false });
                    if (data) this.standings = data.map(i => ({ name: i.team_name, logo: i.logo_url, played: i.played, points: i.points }));
                },

                async logout() {
                    await _supabase.auth.signOut();
                    window.location.href = 'signin.html';
                }
            }
        }
    </script>
</body>
</html>
