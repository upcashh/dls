<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0f1a">
    <title>DLS26 | Command Center</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #0a0f1a; font-family: 'DM Sans', sans-serif; color: white; overflow-x: hidden; }
        .outfit { font-family: 'Outfit', sans-serif; }
        
        .glass-card { 
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%); 
            border: 1px solid rgba(0, 255, 133, 0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .nav-active { color: #00ff85 !important; background: rgba(0, 255, 133, 0.08); border-top: 2px solid #00ff85; }
        [x-cloak] { display: none !important; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .active-md {
            background: #00ff85;
            color: #0a0f1a;
            box-shadow: 0 0 15px rgba(0, 255, 133, 0.3);
        }

        /* Stats Column Widths */
        .col-stat { width: 22px; text-align: center; }
        .col-pts { width: 28px; text-align: center; }
    </style>
</head>
<body x-data="leagueApp()" x-init="init()" class="pb-24">

    <header class="bg-[#0a0f1a] border-b border-[#00ff8526] sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <template x-if="view !== 'lobby'">
                    <button @click="view = 'lobby'" class="mr-2 text-white/40 hover:text-[#00ff85]">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                </template>
                <div class="leading-none">
                    <span class="outfit text-white text-xl font-900 tracking-tighter uppercase">DLS<span class="text-[#00ff85]">26</span></span>
                    <span class="block text-[8px] tracking-[0.3em] font-bold text-[#00ff85] opacity-80 uppercase" x-text="view === 'lobby' ? 'Network Lobby' : 'Active Sector'"></span>
                </div>
            </div>
            
            <button @click="logout()" class="p-2 bg-red-500/10 rounded-lg text-red-500 border border-red-500/20">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 pt-8">

        <div x-show="view === 'lobby'" x-transition x-cloak>
            <h2 class="outfit font-900 text-2xl uppercase tracking-tighter mb-6 px-1 text-center">Available <span class="text-[#00ff85]">Deployment</span></h2>
            
            <template x-if="activeLeague">
                <div class="glass-card rounded-3xl p-8 relative overflow-hidden group transition-all duration-500">
                    <div class="absolute -right-10 -top-10 w-32 h-32 bg-[#00ff85] opacity-10 blur-3xl"></div>
                    <div class="flex flex-col items-center text-center">
                        <div class="w-20 h-20 bg-[#00ff851a] rounded-2xl flex items-center justify-center mb-6 border border-[#00ff8533]">
                            <img src="https://www.premierleague.com/resources/rebrand/v7.131.1/i/elements/pl-main-logo.png" class="w-12 h-12">
                        </div>
                        <h3 class="outfit font-900 text-3xl uppercase tracking-tight mb-2">
                            <span x-text="activeLeague.name"></span> <span class="text-[#00ff85]" x-text="activeLeague.season_number"></span>
                        </h3>
                        <div class="flex items-center space-x-3 mb-6">
                            <span :class="activeLeague.status === 'active' ? 'bg-[#00ff85] text-[#0a0f1a]' : 'bg-red-500 text-white'" 
                                  class="text-[9px] px-3 py-1 rounded-full font-black uppercase tracking-widest" 
                                  x-text="activeLeague.status === 'active' ? 'ONGOING' : 'COMPLETED'"></span>
                            <span class="text-[9px] text-white/40 font-bold uppercase tracking-widest">Official Season</span>
                        </div>
                        <div class="w-full grid grid-cols-3 gap-4 border-t border-white/5 pt-6 mb-8">
                            <div>
                                <p class="text-[10px] text-white/30 uppercase font-black">Teams</p>
                                <p class="text-lg font-bold outfit"><span x-text="standings.length"></span>/<span x-text="activeLeague.total_slots"></span></p>
                            </div>
                            <div>
                                <p class="text-[10px] text-white/30 uppercase font-black">Status</p>
                                <p class="text-lg font-bold outfit uppercase text-[#00ff85]" x-text="activeLeague.status"></p>
                            </div>
                            <div>
                                <p class="text-[10px] text-white/30 uppercase font-black">Prize</p>
                                <p class="text-lg font-bold outfit" x-text="activeLeague.prize_pool || 'GOLD'">GOLD</p>
                            </div>
                        </div>
                        <button @click="enterLeague()" class="w-full py-4 bg-[#00ff85] text-[#0a0f1a] rounded-xl outfit font-900 uppercase tracking-widest text-sm hover:scale-[1.02] transition-all shadow-lg">
                            ENTER PROTOCOL
                        </button>
                    </div>
                </div>
            </template>
        </div>

        <div x-show="view !== 'lobby' && view !== 'admin'" x-transition x-cloak>
            
            <div x-show="view === 'home'">
                <div class="flex items-center justify-between mb-4 px-1">
                    <h2 class="outfit font-900 text-xl uppercase tracking-tighter">League <span class="text-[#00ff85]">Analytics</span></h2>
                </div>
                <div class="glass-card rounded-2xl overflow-hidden">
                    <table class="w-full text-left table-fixed">
                        <thead class="bg-black/40 border-b border-white/5 text-[#5a6477] font-bold text-[8px] uppercase tracking-tighter">
                            <tr>
                                <th class="py-4 pl-3 w-6">#</th>
                                <th class="py-4">Club</th>
                                <th class="py-4 col-stat">MP</th>
                                <th class="py-4 col-stat">W</th>
                                <th class="py-4 col-stat">D</th>
                                <th class="py-4 col-stat">L</th>
                                <th class="py-4 col-stat text-white/30">GS</th>
                                <th class="py-4 col-stat text-white/30">GA</th>
                                <th class="py-4 col-stat">GD</th>
                                <th class="py-4 col-pts text-[#00ff85]">PTS</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-white/5 text-[10px]">
                            <template x-for="(team, index) in standings" :key="index">
                                <tr :class="team.name === userTeam ? 'bg-[#00ff8510]' : ''" class="hover:bg-white/[0.02] transition-colors">
                                    <td class="py-4 pl-3 text-white/30 font-bold" x-text="index + 1"></td>
                                    <td class="py-4 flex items-center space-x-2 overflow-hidden">
                                        <img :src="team.logo" class="w-4 h-4 object-contain flex-shrink-0" onerror="this.src='https://via.placeholder.com/50'">
                                        <span class="font-bold uppercase truncate" x-text="team.name"></span>
                                    </td>
                                    <td class="text-center text-white/60" x-text="team.played"></td>
                                    <td class="text-center text-white/60" x-text="team.won"></td>
                                    <td class="text-center text-white/60" x-text="team.drawn"></td>
                                    <td class="text-center text-white/60" x-text="team.lost"></td>
                                    <td class="text-center text-white/30" x-text="team.gs"></td>
                                    <td class="text-center text-white/30" x-text="team.ga"></td>
                                    <td class="text-center font-bold" :class="team.gd >= 0 ? 'text-white/60' : 'text-red-400'" x-text="(team.gd > 0 ? '+' : '') + team.gd"></td>
                                    <td class="text-center font-black text-[#00ff85] bg-[#00ff8505]" x-text="team.points"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>

            <div x-show="view === 'fixtures'">
                <div class="flex items-center justify-between mb-2 px-1">
                    <h2 class="outfit font-900 text-xl uppercase tracking-tighter">Matchday <span class="text-[#00ff85]" x-text="currentMatchday"></span></h2>
                </div>
                <div class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 py-2">
                    <template x-for="n in totalMatchdays">
                        <button @click="currentMatchday = n; fetchFixtures()" 
                                :class="currentMatchday === n ? 'active-md' : 'bg-white/5 text-white/40'"
                                class="px-5 py-2.5 rounded-xl text-[10px] font-black outfit uppercase transition-all flex-shrink-0 border border-white/5"
                                x-text="'MD ' + n">
                        </button>
                    </template>
                </div>
                <div class="space-y-3">
                    <template x-for="match in fixtures" :key="match.id">
                        <div @click="selectedMatch = match; view = 'admin'; form.h_score=0; form.a_score=0;" 
                             class="glass-card p-4 rounded-xl flex items-center justify-between border-l-4 cursor-pointer hover:border-[#00ff85] transition-all" 
                             :class="match.match_date === '1st Leg' ? 'border-l-[#00ff85]' : 'border-l-blue-400'">
                            <div class="flex items-center space-x-2 w-1/3">
                                <img :src="match.home_logo" class="w-5 h-5 object-contain">
                                <span class="text-[10px] font-bold uppercase truncate" x-text="match.home_team"></span>
                            </div>
                            <div class="bg-black/40 px-3 py-2 rounded border border-white/5 text-center min-w-[80px]">
                                <span class="text-white/40 text-[8px] block uppercase font-black mb-0.5">Matchday <span x-text="match.matchday"></span></span>
                                <span class="text-[#00ff85] text-[9px] font-black uppercase tracking-widest" x-text="match.match_date"></span>
                            </div>
                            <div class="flex items-center space-x-2 w-1/3 justify-end">
                                <span class="text-[10px] font-bold uppercase truncate" x-text="match.away_team"></span>
                                <img :src="match.away_logo" class="w-5 h-5 object-contain">
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="view === 'results'">
                <h2 class="outfit font-900 text-xl uppercase tracking-tighter mb-4">Historical <span class="text-[#00ff85]">Data</span></h2>
                <div class="space-y-3">
                    <template x-for="res in results" :key="res.id">
                        <div class="glass-card p-4 rounded-xl flex items-center justify-between">
                            <div class="flex items-center space-x-2 w-1/3">
                                <img :src="res.home_logo" class="w-4 h-4 object-contain">
                                <span class="text-[10px] font-bold uppercase truncate" x-text="res.home_name"></span>
                            </div>
                            <div class="flex items-center space-x-2 bg-[#00ff851a] px-3 py-1 rounded border border-[#00ff8533] min-w-[70px] justify-center">
                                <span class="text-[#00ff85] font-black text-xs" x-text="res.h_score"></span>
                                <span class="text-white/20 text-[10px]">:</span>
                                <span class="text-[#00ff85] font-black text-xs" x-text="res.a_score"></span>
                            </div>
                            <div class="flex items-center space-x-2 w-1/3 justify-end">
                                <span class="text-[10px] font-bold uppercase truncate text-right" x-text="res.away_name"></span>
                                <img :src="res.away_logo" class="w-4 h-4 object-contain">
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <div x-show="view === 'admin'" x-transition x-cloak class="max-w-md mx-auto">
            <div class="flex items-center justify-between mb-6">
                <h2 class="outfit font-900 text-xl uppercase tracking-tighter text-red-500">Result <span class="text-white">Protocol</span></h2>
                <button @click="view = 'fixtures'" class="text-[10px] font-black uppercase text-white/30 tracking-widest">Cancel</button>
            </div>

            <template x-if="selectedMatch">
                <div class="glass-card rounded-3xl p-8 border-red-500/30">
                    <div class="flex justify-between items-center mb-10">
                        <div class="text-center w-1/3">
                            <img :src="selectedMatch.home_logo" class="w-12 h-12 mx-auto mb-3 object-contain">
                            <p class="text-[10px] font-black uppercase truncate" x-text="selectedMatch.home_team"></p>
                        </div>
                        <div class="flex items-center space-x-3">
                            <input type="number" x-model="form.h_score" class="w-14 h-14 bg-white/5 border border-white/10 rounded-2xl text-center font-black text-2xl text-[#00ff85] focus:border-[#00ff85] outline-none">
                            <span class="text-white/10 font-black text-xl">:</span>
                            <input type="number" x-model="form.a_score" class="w-14 h-14 bg-white/5 border border-white/10 rounded-2xl text-center font-black text-2xl text-[#00ff85] focus:border-[#00ff85] outline-none">
                        </div>
                        <div class="text-center w-1/3">
                            <img :src="selectedMatch.away_logo" class="w-12 h-12 mx-auto mb-3 object-contain">
                            <p class="text-[10px] font-black uppercase truncate" x-text="selectedMatch.away_team"></p>
                        </div>
                    </div>

                    <button @click="submitResult()" 
                            :disabled="submitting"
                            class="w-full py-4 bg-red-600 text-white rounded-xl outfit font-900 uppercase tracking-widest text-sm shadow-lg active:scale-95 transition-all disabled:opacity-50">
                        <span x-text="submitting ? 'EXECUTING...' : 'CONFIRM & PURGE FIXTURE'"></span>
                    </button>
                </div>
            </template>
        </div>

    </main>

    <nav x-show="view !== 'lobby' && view !== 'admin'" class="fixed bottom-0 left-0 right-0 bg-[#0a0f1a] border-t border-white/5 flex justify-around p-2 pb-6 backdrop-blur-lg z-50">
        <button @click="view = 'home'" :class="view === 'home' ? 'nav-active' : ''" class="flex flex-col items-center p-3 rounded-xl text-white/40 w-full transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
            <span class="text-[8px] font-bold uppercase mt-1.5 tracking-widest">Table</span>
        </button>
        <button @click="view = 'fixtures'; fetchFixtures()" :class="view === 'fixtures' ? 'nav-active' : ''" class="flex flex-col items-center p-3 rounded-xl text-white/40 w-full transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[8px] font-bold uppercase mt-1.5 tracking-widest">Fixtures</span>
        </button>
        <button @click="view = 'results'" :class="view === 'results' ? 'nav-active' : ''" class="flex flex-col items-center p-3 rounded-xl text-white/40 w-full transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[8px] font-bold uppercase mt-1.5 tracking-widest">Results</span>
        </button>
    </nav>

        <script>
        const _supabase = supabase.createClient('https://irzgzyfscoosvixwvfhx.supabase.co', 'sb_publishable_5WjuPG6Wg96_ySp0DcDuTw_JTGWxSJh');

        function leagueApp() {
            return {
                view: 'lobby',
                activeLeague: null,
                standings: [],
                fixtures: [],
                results: [],
                userTeam: '', 
                currentMatchday: 1,
                totalMatchdays: 0,
                selectedMatch: null,
                submitting: false,
                form: { h_score: 0, a_score: 0 },
                isAdmin: false,
                adminId: 'c2185ce2-e803-410a-91a8-ea21aa206b98', // <--- PASTE YOUR ID HERE

                async init() {
                    const { data: { user } } = await _supabase.auth.getUser();
                    if (!user) { window.location.href = 'signin.html'; return; }

                    // Check if logged in user is Admin
                    if (user.id === this.adminId) {
                        this.isAdmin = true;
                    }

                    const { data: userData } = await _supabase.from('standings').select('team_name').eq('user_id', user.id).maybeSingle();
                    if (userData) this.userTeam = userData.team_name;

                    const { data: leagueData } = await _supabase.from('leagues').select('*').eq('name', 'Premier League').single();
                    if (leagueData) this.activeLeague = leagueData;

                    const { data: standData } = await _supabase.from('standings').select('*').order('points', { ascending: false }).order('gd', { ascending: false });
                    if (standData) {
                        this.standings = standData.map(i => ({ 
                            name: i.team_name, 
                            logo: i.logo_url, 
                            played: i.played || 0,
                            won: i.won || 0,
                            drawn: i.drawn || 0,
                            lost: i.lost || 0,
                            gs: i.gs || 0,
                            ga: i.ga || 0,
                            gd: i.gd || 0,
                            points: i.points || 0 
                        }));
                        this.totalMatchdays = standData.length % 2 === 0 ? standData.length - 1 : standData.length;
                    }

                    const { data: resData } = await _supabase.from('results').select('*').order('created_at', { ascending: false });
                    if (resData) this.results = resData;
                },

                enterLeague() {
                    this.view = 'home';
                    this.fetchFixtures();
                },

                async fetchFixtures() {
                    if (!this.activeLeague) return;
                    const { data: fixData } = await _supabase
                        .from('fixtures')
                        .select('*')
                        .eq('league_id', this.activeLeague.id)
                        .eq('matchday', this.currentMatchday)
                        .order('match_date', { ascending: true }); 
                    
                    if (fixData) this.fixtures = fixData;
                },

                async submitResult() {
                    if(!confirm("Purge fixture and finalize score?")) return;
                    this.submitting = true;
                    const m = this.selectedMatch;
                    const hScore = parseInt(this.form.h_score);
                    const aScore = parseInt(this.form.a_score);

                    try {
                        // 1. Log to Results History (INCLUDES LOGOS)
                        await _supabase.from('results').insert([{
                            home_name: m.home_team,
                            home_logo: m.home_logo,
                            away_name: m.away_team,
                            away_logo: m.away_logo,
                            h_score: hScore,
                            a_score: aScore,
                            league_id: m.league_id,
                            matchday: m.matchday
                        }]);

                        // 2. Update Table Stats
                        await this.updateTeamStats(m.home_team, hScore, aScore);
                        await this.updateTeamStats(m.away_team, aScore, hScore);

                        // 3. Delete from Fixtures
                        await _supabase.from('fixtures').delete().eq('id', m.id);

                        // 4. Reset & Refresh
                        this.view = 'home';
                        await this.init();
                    } catch (e) {
                        alert("Logic Error: Database update failed.");
                        console.error(e);
                    } finally {
                        this.submitting = false;
                        this.selectedMatch = null;
                    }
                },

                async updateTeamStats(teamName, gs, ga) {
                    const { data: current } = await _supabase.from('standings').select('*').eq('team_name', teamName).single();
                    
                    let win = gs > ga ? 1 : 0;
                    let draw = gs === ga ? 1 : 0;
                    let loss = gs < ga ? 1 : 0;
                    let pointsToAdd = (win * 3) + (draw * 1);

                    await _supabase.from('standings').update({
                        played: (current.played || 0) + 1,
                        won: (current.won || 0) + win,
                        drawn: (current.drawn || 0) + draw,
                        lost: (current.lost || 0) + loss,
                        gs: (current.gs || 0) + gs,
                        ga: (current.ga || 0) + ga,
                        gd: (current.gd || 0) + (gs - ga),
                        points: (current.points || 0) + pointsToAdd
                    }).eq('team_name', teamName);
                },

                async logout() {
                    await _supabase.auth.signOut();
                    window.location.href = 'signin.html';
                }
            }
        }
        </script>
</body>
</html>
