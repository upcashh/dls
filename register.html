<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0f1a">
    <title>DLS26 | Create Account</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #0a0f1a; font-family: 'DM Sans', sans-serif; color: white; }
        .outfit { font-family: 'Outfit', sans-serif; }
        
        .icon-box {
            background: #00ce9c;
            border-radius: 12px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 206, 156, 0.4);
        }

        .glass-card { 
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%); 
            border: 1px solid rgba(0, 206, 156, 0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .input-container { position: relative; width: 100%; }

        .field { 
            width: 100%; 
            padding: 1rem 1rem 1rem 3.5rem; 
            border-radius: 0.75rem; 
            background: rgba(10, 15, 26, 0.5); 
            border: 1px solid rgba(255,255,255,0.08); 
            color: white; 
            outline: none; 
            transition: all 0.3s ease; 
            font-size: 0.9rem;
        }

        .floating-label {
            position: absolute;
            left: 3.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: #111827; 
            padding: 0 6px;
            color: #5a6477;
            font-size: 0.875rem;
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .field:focus + .floating-label,
        .field:not(:placeholder-shown) + .floating-label {
            top: 0;
            font-size: 0.75rem;
            color: #00CE9C;
            transform: translateY(-50%) scale(0.9);
        }

        .field:focus { border-color: #00CE9C; box-shadow: 0 0 10px rgba(0, 206, 156, 0.1); }
        .input-icon { position: absolute; left: 1.25rem; top: 1.15rem; color: #00CE9C; opacity: 0.8; z-index: 10; }
        
        /* Toggle Icon Style */
        .toggle-icon { position: absolute; right: 1.25rem; top: 1.15rem; color: #5a6477; cursor: pointer; transition: color 0.3s; z-index: 20; }
        .toggle-icon:hover { color: #00CE9C; }

        .btn-primary {
            background: #00CE9C;
            color: #0a0f1a;
            box-shadow: 0 10px 20px rgba(0,206,156,0.2);
            transition: all 0.3s ease;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

        .dls-brand-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 3.5rem;
            letter-spacing: -2px;
            line-height: 1;
        }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.6s ease forwards; }

        .file-box {
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(10, 15, 26, 0.5);
            border-radius: 0.75rem;
            padding: 12px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    
    <div style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:0;">
        <div style="position:absolute;top:-20%;right:-15%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,206,156,0.08) 0%,transparent 70%);"></div>
        <div style="position:absolute;bottom:-10%;left:-10%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(0,206,156,0.05) 0%,transparent 70%);"></div>
    </div>

    <div class="relative z-10 w-full max-w-lg fade-up">
        <header class="text-center mb-8">
            <div class="flex items-center justify-center gap-3 mb-2">
               <h1 class="dls-brand-text text-white">DLS<span style="color:#00ce9c;">26</span></h1>
            </div>
            <p class="outfit font-bold text-[10px] text-white/60 tracking-[4px] uppercase">Elite Premier League Infrastructure</p>
        </header>

        <div class="glass-card rounded-3xl p-6 sm:p-10" x-data="registerApp()">
            <form @submit.prevent="handleSignUp" class="space-y-6">
                
                <div class="input-container">
                    <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <input type="text" x-model="formData.username" @input="verifyUsername" required placeholder=" " class="field">
                    <label class="floating-label">Username</label>
                    <div class="flex justify-between mt-1 px-1">
                        <span class="text-[9px] text-slate-500 uppercase font-bold">A-z only (Lowercase)</span>
                        <span x-show="usernameMsg" :class="usernameValid ? 'text-[#00CE9C]' : 'text-red-500'" class="text-[9px] font-black uppercase" x-text="usernameMsg"></span>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="input-container">
                        <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9"></path></svg>
                        <input type="text" x-model="formData.teamName" required placeholder=" " class="field">
                        <label class="floating-label">Team Name</label>
                    </div>

                    <div class="input-container">
                        <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        <input type="tel" x-model="formData.phone" maxlength="10" required placeholder=" " class="field">
                        <label class="floating-label">Phone Number</label>
                    </div>
                </div>

                <div class="input-container">
                    <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    <input type="email" x-model="formData.email" required placeholder=" " class="field">
                    <label class="floating-label">Email Address</label>
                </div>

                <div class="file-box">
                    <p class="text-[10px] uppercase font-black text-[#00CE9C] tracking-widest mb-2">Club Emblem</p>
                    <input type="file" @change="onFileChange" accept="image/*" class="w-full text-[11px] text-slate-400 file:mr-3 file:py-1 file:px-3 file:rounded file:border-0 file:bg-[#00CE9C] file:text-[#0a0f1a] file:font-bold cursor-pointer" required>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="input-container">
                        <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        <input :type="showPass ? 'text' : 'password'" x-model="formData.password" required placeholder=" " class="field">
                        <label class="floating-label">Password</label>
                        <div class="toggle-icon" @click="showPass = !showPass">
                            <svg x-show="!showPass" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            <svg x-show="showPass" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"/></svg>
                        </div>
                    </div>

                    <div class="input-container">
                        <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                        <input :type="showConfirm ? 'text' : 'password'" x-model="formData.confirmPassword" required placeholder=" " class="field">
                        <label class="floating-label">Confirm</label>
                        <div class="toggle-icon" @click="showConfirm = !showConfirm">
                            <svg x-show="!showConfirm" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            <svg x-show="showConfirm" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"/></svg>
                        </div>
                    </div>
                </div>

                <button type="submit" :disabled="!canSubmit || loading" class="btn-primary w-full py-4 rounded-xl text-lg mt-4 outfit">
                    <span x-text="loading ? 'INITIALIZING...' : 'REGISTER NOW'"></span>
                </button>
            </form>

            <div class="mt-8 text-center pt-4 border-t border-white/5">
                <p class="text-slate-500 text-sm">Board Member? <a href="signin.html" class="text-[#00CE9C] font-bold hover:underline">Sign In</a></p>
            </div>
        </div>

        <footer class="mt-8 flex justify-center space-x-12 opacity-40 hover:opacity-100 transition-opacity">
            <a href="https://wa.me/256778105402" class="text-[10px] font-bold text-white uppercase tracking-[3px]">aldrine</a>
            <a href="https://www.instagram.com/aldrine___" class="text-[10px] font-bold text-white uppercase tracking-[3px]">aldrine</a>
        </footer>
    </div>

    <script>
        const supabaseUrl = 'https://irzgzyfscoosvixwvfhx.supabase.co';
        const supabaseKey = 'sb_publishable_5WjuPG6Wg96_ySp0DcDuTw_JTGWxSJh'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function registerApp() {
            return {
                formData: { username: '', teamName: '', email: '', phone: '', password: '', confirmPassword: '' },
                logo: null,
                loading: false,
                usernameValid: false,
                usernameMsg: '',
                timer: null,
                showPass: false,
                showConfirm: false,

                verifyUsername() {
                    // Force lowercase, remove spaces, and strip non-alpha characters
                    this.formData.username = this.formData.username.toLowerCase().replace(/\s/g, '').replace(/[^a-z0-9]/g, '');

                    if (this.formData.username.length < 4) {
                        this.usernameValid = false;
                        this.usernameMsg = "MIN 4 CHARS";
                        return;
                    }

                    this.usernameMsg = "Checking availability...";
                    this.usernameValid = false;

                    clearTimeout(this.timer);
                    this.timer = setTimeout(async () => {
                        try {
                            const { data, error } = await _supabase
                                .from('userinfo')
                                .select('username')
                                .eq('username', this.formData.username)
                                .maybeSingle();
                            
                            if (data) {
                                this.usernameValid = false;
                                this.usernameMsg = "Username taken";
                            } else {
                                this.usernameValid = true;
                                this.usernameMsg = "Username available";
                            }
                        } catch (e) {
                            this.usernameMsg = "Error checking";
                        }
                    }, 500);
                },

                onFileChange(e) { this.logo = e.target.files[0]; },

                get canSubmit() {
                    return this.usernameValid && this.formData.phone.length === 10 && this.formData.password.length >= 8 && this.formData.password === this.formData.confirmPassword && this.logo !== null;
                },

                async handleSignUp() {
                    if (!this.canSubmit) return;
                    this.loading = true;
                    try {
                        const { data: authData, error: authError } = await _supabase.auth.signUp({
                            email: this.formData.email,
                            password: this.formData.password
                        });
                        if (authError) throw authError;

                        const fileExt = this.logo.name.split('.').pop();
                        const fileName = `${this.formData.username}-${Date.now()}.${fileExt}`;
                        const { error: uploadError } = await _supabase.storage.from('logos').upload(fileName, this.logo);
                        if (uploadError) throw uploadError;

                        const logoUrl = `${supabaseUrl}/storage/v1/object/public/logos/${fileName}`;

                        const { error: dbError } = await _supabase.from('userinfo').insert([{
                            username: this.formData.username,
                            team_name: this.formData.teamName,
                            email: this.formData.email,
                            phone: this.formData.phone,
                            logo_url: logoUrl
                        }]);
                        if (dbError) throw dbError;

                        alert("Registration Successful!");
                        window.location.href = 'signin.html';
                    } catch (err) {
                        alert(err.message);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
