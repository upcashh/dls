<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Elite | DLS Premier League</title>
    <meta name="theme-color" content="#3d195b">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --epl-purple: #3d195b; --epl-green: #00ff85; }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #3d195b 0%, #1a082e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .bebas { font-family: 'Bebas Neue', cursive; }
        .glass {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .dls-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .dls-input:focus {
            border-color: var(--epl-green);
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 133, 0.2);
        }
        .dls-brand { font-family: 'Arial Black', sans-serif; font-style: italic; letter-spacing: -2px; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="registerForm()">

    <div class="glass w-full max-w-lg rounded-3xl p-8 md:p-10">
        <div class="text-center mb-8">
            <div class="flex items-center justify-center space-x-2 mb-2">
                <img src="https://www.premierleague.com/resources/rebrand/v7.131.1/i/elements/pl-main-logo.png" class="w-10 h-10">
                <span class="dls-brand text-3xl text-[#00ff85]">DLS</span>
            </div>
            <h1 class="bebas text-3xl text-white tracking-wide">PREMIER LEAGUE</h1>
            <p class="text-gray-400 text-sm mt-2">Welcome to the elite gaming platform. Create your legacy.</p>
        </div>

        <form @submit.prevent="handleRegister" class="space-y-5">
            
            <div>
                <label class="text-[10px] uppercase font-bold text-gray-400 ml-1">Username (Small letters, no symbols)</label>
                <div class="relative mt-1">
                    <span class="absolute inset-y-0 left-3 flex items-center text-gray-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </span>
                    <input type="text" x-model="formData.username" @input="checkUsername" required
                        class="dls-input w-full pl-10 pr-4 py-3 rounded-xl text-sm" placeholder="e.g. kampalaking">
                </div>
                <template x-if="usernameMsg">
                    <p class="text-[10px] mt-1 font-bold italic" :class="usernameAvailable ? 'text-[#00ff85]' : 'text-red-500'" x-text="usernameMsg"></p>
                </template>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-400 ml-1">DLS Team Name</label>
                    <input type="text" x-model="formData.teamName" required
                        class="dls-input w-full px-4 py-3 mt-1 rounded-xl text-sm" placeholder="Arsenal UG">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-400 ml-1">Phone (10 Digits)</label>
                    <input type="tel" x-model="formData.phone" maxlength="10" required
                        class="dls-input w-full px-4 py-3 mt-1 rounded-xl text-sm" placeholder="0700000000">
                </div>
            </div>

            <div>
                <label class="text-[10px] uppercase font-bold text-gray-400 ml-1">Email Address</label>
                <input type="email" x-model="formData.email" required
                    class="dls-input w-full px-4 py-3 mt-1 rounded-xl text-sm" placeholder="manager@example.com">
            </div>

            <div>
                <label class="text-[10px] uppercase font-bold text-gray-400 ml-1">Upload Team Logo (PNG)</label>
                <input type="file" @change="handleFileUpload" accept="image/*" required
                    class="block w-full text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-epl-green file:text-purple-900 hover:file:bg-white cursor-pointer mt-1">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <input type="password" x-model="formData.password" placeholder="Password" required
                        class="dls-input w-full px-4 py-3 rounded-xl text-sm">
                </div>
                <div>
                    <input type="password" x-model="formData.confirmPassword" placeholder="Confirm" required
                        class="dls-input w-full px-4 py-3 rounded-xl text-sm">
                </div>
            </div>

            <button type="submit" :disabled="!isFormValid || loading"
                :class="(!isFormValid || loading) ? 'opacity-50 cursor-not-allowed bg-gray-600' : 'bg-[#00ff85] hover:scale-[1.02] active:scale-95 text-purple-900'"
                class="w-full py-4 rounded-xl font-black uppercase tracking-widest text-sm transition-all shadow-lg flex justify-center items-center">
                <span x-show="!loading">Register Now</span>
                <svg x-show="loading" class="animate-spin h-5 w-5 text-purple-900" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <div class="mt-8 text-center space-y-2">
            <p class="text-xs text-gray-400">Already a manager? <a href="signin.html" class="text-[#00ff85] font-bold">Sign In</a></p>
            <a href="forgotpassword.html" class="text-[10px] text-gray-500 hover:text-white transition-colors">Forgot Password?</a>
        </div>
    </div>

    <script>
        // Supabase Initialization
        const supabaseUrl = 'https://irzgzyfscoosvixwvfhx.supabase.co';
        const supabaseKey = 'sb_publishable_5WjuPG6Wg96_ySp0DcDuTw_JTGWxSJh';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function registerForm() {
            return {
                formData: {
                    username: '', teamName: '', email: '', phone: '', password: '', confirmPassword: ''
                },
                logoFile: null,
                loading: false,
                usernameAvailable: false,
                usernameMsg: '',

                checkUsername() {
                    // Regex: lowercase only, 4+ chars, no symbols
                    const regex = /^[a-z]{4,}$/;
                    if (!regex.test(this.formData.username)) {
                        this.usernameAvailable = false;
                        this.usernameMsg = 'Min 4 lowercase letters only, no spaces/symbols.';
                        return;
                    }

                    // Look up in Supabase userinfo table
                    clearTimeout(this.timeout);
                    this.timeout = setTimeout(async () => {
                        const { data, error } = await _supabase
                            .from('userinfo')
                            .select('username')
                            .eq('username', this.formData.username)
                            .single();
                        
                        if (data) {
                            this.usernameAvailable = false;
                            this.usernameMsg = 'Username taken';
                        } else {
                            this.usernameAvailable = true;
                            this.usernameMsg = 'Username available';
                        }
                    }, 500);
                },

                handleFileUpload(e) {
                    this.logoFile = e.target.files[0];
                },

                get isFormValid() {
                    return (
                        this.usernameAvailable &&
                        this.formData.phone.length === 10 &&
                        this.formData.password.length >= 6 &&
                        this.formData.password === this.formData.confirmPassword &&
                        this.logoFile
                    );
                },

                async handleRegister() {
                    this.loading = true;
                    
                    // 1. Sign Up for Supabase Auth
                    const { data: authData, error: authError } = await _supabase.auth.signUp({
                        email: this.formData.email,
                        password: this.formData.password,
                    });

                    if (authError) {
                        alert(authError.message);
                        this.loading = false;
                        return;
                    }

                    // 2. Upload Logo to Storage
                    const fileExt = this.logoFile.name.split('.').pop();
                    const fileName = `${this.formData.username}-${Math.random()}.${fileExt}`;
                    const { error: uploadError } = await _supabase.storage
                        .from('logos')
                        .upload(fileName, this.logoFile);

                    const logoUrl = `${supabaseUrl}/storage/v1/object/public/logos/${fileName}`;

                    // 3. Save to userinfo table
                    const { error: dbError } = await _supabase
                        .from('userinfo')
                        .insert([{
                            username: this.formData.username,
                            team_name: this.formData.teamName,
                            email: this.formData.email,
                            phone: this.formData.phone,
                            logo_url: logoUrl
                        }]);

                    if (!dbError) {
                        alert(`Welcome ${this.formData.username}! Check your email to verify.`);
                        window.location.href = 'verify.html';
                    }
                    this.loading = false;
                }
            }
        }
    </script>
</body>
</html>
