<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0f1a">
    <title>DLS26 | Command Center Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #0a0f1a; font-family: 'DM Sans', sans-serif; color: white; overflow-x: hidden; }
        .outfit { font-family: 'Outfit', sans-serif; }
        
        .glass-card { 
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%); 
            border: 1px solid rgba(0, 255, 133, 0.15);
        }

        /* Navigation */
        .nav-active { color: #00ff85 !important; background: rgba(0, 255, 133, 0.08); border-top: 2px solid #00ff85; }
        [x-cloak] { display: none !important; }

        /* Matchday Toggles */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-md { background: #00ff85; color: #0a0f1a; box-shadow: 0 0 15px rgba(0, 255, 133, 0.3); }

        /* Optimized Table (No Horizontal Scroll) */
        .col-stat { width: 24px; text-align: center; font-size: 9px; }
        .col-pts { width: 30px; text-align: center; font-weight: 900; color: #00ff85; }
        
        /* Circular Logos */
        .logo-circle-md { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: #1a2333; }
        .logo-circle-sm { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }

        /* Form Boxes */
        .form-box { width: 20px; height: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; }
        .form-w { background: #00ff85; color: #0a0f1a; }
        .form-d { background: #ffcc00; color: #0a0f1a; }
        .form-l { background: #ff4d4d; color: white; }
    </style>
</head>
<body x-data="leagueApp()" x-init="init()" class="pb-24">

    <header class="bg-[#0a0f1a] border-b border-[#00ff8526] sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center">
                <template x-if="view !== 'lobby'">
                    <button @click="view = 'lobby'" class="mr-3 text-white/40">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                </template>
                <div class="leading-none">
                    <span class="outfit text-white text-xl font-900 tracking-tighter uppercase">DLS<span class="text-[#00ff85]">26</span></span>
                    <span class="block text-[8px] tracking-[0.3em] font-bold text-[#00ff85] opacity-80 uppercase" x-text="view === 'lobby' ? 'Network Lobby' : 'Active Sector'"></span>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <div class="text-right hidden sm:block">
                    <p class="text-[8px] font-black text-white/40 uppercase" x-text="userTeam || 'Guest'"></p>
                </div>
                <img :src="userProfile.logo || 'https://via.placeholder.com/50'" class="w-8 h-8 rounded-full border border-[#00ff8533]">
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 pt-6">

        <div x-show="view === 'lobby'" x-transition x-cloak>
            <h2 class="outfit font-900 text-2xl uppercase tracking-tighter mb-6 text-center">Available <span class="text-[#00ff85]">Leagues</span></h2>
            <template x-if="activeLeague">
                <div class="glass-card rounded-3xl p-8 text-center relative overflow-hidden">
                    <div class="absolute -right-10 -top-10 w-32 h-32 bg-[#00ff85] opacity-5 blur-3xl"></div>
                    <img src="https://www.premierleague.com/resources/rebrand/v7.131.1/i/elements/pl-main-logo.png" class="w-16 h-16 mx-auto mb-4">
                    <h3 class="outfit font-900 text-3xl uppercase mb-1" x-text="activeLeague.name"></h3>
                    <p class="text-[#00ff85] font-black text-xs tracking-widest mb-6">SEASON <span x-text="activeLeague.season_number"></span></p>
                    
                    <div class="grid grid-cols-3 gap-2 border-y border-white/5 py-6 mb-8">
                        <div><p class="text-[9px] text-white/30 uppercase font-black">Slots</p><p class="text-lg font-bold" x-text="standings.length + '/16'"></p></div>
                        <div><p class="text-[9px] text-white/30 uppercase font-black">Mode</p><p class="text-lg font-bold text-[#00ff85]">ELITE</p></div>
                        <div><p class="text-[9px] text-white/30 uppercase font-black">Prize</p><p class="text-lg font-bold">Trophy</p></div>
                    </div>

                    <button @click="view = 'home'" class="w-full py-4 bg-[#00ff85] text-[#0a0f1a] rounded-xl outfit font-900 uppercase tracking-widest shadow-lg">
                        ENTER PROTOCOL
                    </button>
                </div>
            </template>
        </div>

        <div x-show="view !== 'lobby' && view !== 'admin'" x-transition x-cloak>
            
            <div x-show="view === 'home'">
                <h2 class="outfit font-900 text-xl uppercase mb-4 px-1">League <span class="text-[#00ff85]">Standings</span></h2>
                <div class="glass-card rounded-2xl overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-black/40 border-b border-white/5 text-white/30 text-[8px] uppercase">
                            <tr>
                                <th class="py-3 pl-3 w-6">#</th>
                                <th class="py-3 pl-2">Club</th>
                                <th class="col-stat">P</th>
                                <th class="col-stat">W</th>
                                <th class="col-stat">D</th>
                                <th class="col-stat">L</th>
                                <th class="col-stat">GD</th>
                                <th class="col-pts">PTS</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-white/5 text-[10px]">
                            <template x-for="(team, index) in standings" :key="index">
                                <tr :class="team.name === userTeam ? 'bg-[#00ff8510]' : ''">
                                    <td class="py-4 pl-3 text-white/20 font-bold" x-text="index + 1"></td>
                                    <td class="py-3 pl-2 flex items-center space-x-2">
                                        <img :src="team.logo" class="logo-circle-sm" onerror="this.src='https://via.placeholder.com/50'">
                                        <span class="font-bold uppercase truncate max-w-[80px]" x-text="team.name"></span>
                                    </td>
                                    <td class="col-stat text-white/60" x-text="team.played"></td>
                                    <td class="col-stat text-white/60" x-text="team.won"></td>
                                    <td class="col-stat text-white/60" x-text="team.drawn"></td>
                                    <td class="col-stat text-white/60" x-text="team.lost"></td>
                                    <td class="col-stat font-bold" :class="team.gd >= 0 ? 'text-white/40' : 'text-red-400'" x-text="team.gd"></td>
                                    <td class="col-pts" x-text="team.points"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>

            <div x-show="view === 'fixtures'">
                <h2 class="outfit font-900 text-xl uppercase mb-2">Matchday <span class="text-[#00ff85]" x-text="currentMatchday"></span></h2>
                <div class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 py-2">
                    <template x-for="n in totalMatchdays">
                        <button @click="currentMatchday = n; fetchFixtures()" 
                                :class="currentMatchday === n ? 'active-md' : 'bg-white/5 text-white/40'"
                                class="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase flex-shrink-0 border border-white/5" x-text="'MD ' + n"></button>
                    </template>
                </div>
                <div class="space-y-3">
                    <template x-for="match in fixtures" :key="match.id">
                        <div class="glass-card p-4 rounded-xl flex items-center justify-between border-l-4 border-[#00ff85]">
                            <div class="flex flex-col items-center w-1/3 space-y-1">
                                <img :src="match.home_logo" class="logo-circle-md">
                                <span class="text-[9px] font-bold uppercase truncate w-full text-center" x-text="match.home_team"></span>
                            </div>
                            <div class="text-center">
                                <span class="text-[8px] font-black text-white/20 block uppercase">VS</span>
                                <span class="text-[#00ff85] text-[10px] font-black" x-text="match.match_date || '20:00'"></span>
                            </div>
                            <div class="flex flex-col items-center w-1/3 space-y-1">
                                <img :src="match.away_logo" class="logo-circle-md">
                                <span class="text-[9px] font-bold uppercase truncate w-full text-center" x-text="match.away_team"></span>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="view === 'results'">
                <h2 class="outfit font-900 text-xl uppercase mb-4">Season <span class="text-[#00ff85]">Results</span></h2>
                <div class="space-y-3">
                    <template x-for="res in results" :key="res.id">
                        <div class="glass-card p-4 rounded-xl flex items-center justify-between">
                            <div class="flex items-center space-x-3 w-1/3">
                                <img :src="res.home_logo" class="logo-circle-sm">
                                <span class="text-[9px] font-bold uppercase truncate" x-text="res.home_name"></span>
                            </div>
                            <div class="bg-[#00ff851a] px-3 py-1 rounded border border-[#00ff8533] min-w-[60px] text-center">
                                <span class="text-[#00ff85] font-black text-xs" x-text="res.h_score + ' - ' + res.a_score"></span>
                            </div>
                            <div class="flex items-center space-x-3 w-1/3 justify-end">
                                <span class="text-[9px] font-bold uppercase truncate text-right" x-text="res.away_name"></span>
                                <img :src="res.away_logo" class="logo-circle-sm">
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="view === 'insights'">
                <h2 class="outfit font-900 text-xl uppercase mb-6">Squad <span class="text-[#00ff85]">Insights</span></h2>
                <div class="mb-6">
                    <p class="text-[10px] uppercase font-black text-white/40 mb-3 tracking-widest">Recent Form</p>
                    <div class="flex space-x-2">
                        <template x-for="f in userForm">
                            <div class="form-box" :class="f === 'W' ? 'form-w' : f === 'D' ? 'form-d' : 'form-l'" x-text="f"></div>
                        </template>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass-card p-4 rounded-2xl border-l-2 border-[#00ff85]">
                        <p class="text-[9px] font-black text-white/30 uppercase">Goals Scored</p>
                        <p class="text-2xl font-black text-[#00ff85]" x-text="stats.totalGS"></p>
                    </div>
                    <div class="glass-card p-4 rounded-2xl border-l-2 border-red-500">
                        <p class="text-[9px] font-black text-white/30 uppercase">Goals Conceded</p>
                        <p class="text-2xl font-black text-red-500" x-text="stats.totalGA"></p>
                    </div>
                </div>
            </div>

            <div x-show="view === 'profile'">
                <div class="glass-card rounded-3xl p-8 text-center">
                    <div class="relative inline-block mb-4">
                        <img :src="userProfile.logo || 'https://via.placeholder.com/100'" class="w-24 h-24 rounded-full border-2 border-[#00ff85] p-1">
                        <label class="absolute bottom-0 right-0 bg-[#00ff85] p-2 rounded-full text-[#0a0f1a] cursor-pointer">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M4 5a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2V7a2 2 0 00-2-2h-1.586a1 1 0 01-.707-.293l-1.121-1.121A2 2 0 0011.172 3H8.828a2 2 0 00-1.414.586L6.293 4.707A1 1 0 015.586 5H4zm6 9a3 3 0 100-6 3 3 0 000 6z"/></svg>
                            <input type="file" @change="uploadLogo" class="hidden">
                        </label>
                    </div>
                    <h2 class="outfit font-900 text-2xl uppercase text-[#00ff85]" x-text="userTeam"></h2>
                    <p class="text-white/40 text-[10px] uppercase font-bold tracking-widest" x-text="userProfile.email"></p>
                    
                    <button @click="logout()" class="w-full mt-10 py-4 bg-red-500/10 border border-red-500/20 text-red-500 rounded-xl font-900 uppercase text-xs tracking-widest">
                        TERMINATE SESSION
                    </button>
                </div>
            </div>

        </div>
    </main>

    <nav x-show="view !== 'lobby'" class="fixed bottom-0 left-0 right-0 bg-[#0a0f1a] border-t border-white/5 flex justify-around p-2 pb-6 backdrop-blur-lg z-50">
        <button @click="view = 'home'" :class="view === 'home' ? 'nav-active' : ''" class="flex flex-col items-center p-2 rounded-xl text-white/40 w-full">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
            <span class="text-[7px] font-bold uppercase mt-1">Standings</span>
        </button>
        <button @click="view = 'fixtures'; fetchFixtures()" :class="view === 'fixtures' ? 'nav-active' : ''" class="flex flex-col items-center p-2 rounded-xl text-white/40 w-full">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[7px] font-bold uppercase mt-1">Fixtures</span>
        </button>
        <button @click="view = 'results'" :class="view === 'results' ? 'nav-active' : ''" class="flex flex-col items-center p-2 rounded-xl text-white/40 w-full">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[7px] font-bold uppercase mt-1">Results</span>
        </button>
        <button @click="view = 'insights'" :class="view === 'insights' ? 'nav-active' : ''" class="flex flex-col items-center p-2 rounded-xl text-white/40 w-full">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            <span class="text-[7px] font-bold uppercase mt-1">Insights</span>
        </button>
        <button @click="view = 'profile'" :class="view === 'profile' ? 'nav-active' : ''" class="flex flex-col items-center p-2 rounded-xl text-white/40 w-full">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-[7px] font-bold uppercase mt-1">Profile</span>
        </button>
    </nav>

    <script>
        const _supabase = supabase.createClient('https://irzgzyfscoosvixwvfhx.supabase.co', 'sb_publishable_5WjuPG6Wg96_ySp0DcDuTw_JTGWxSJh');

        function leagueApp() {
            return {
                view: 'lobby',
                activeLeague: null,
                standings: [],
                fixtures: [],
                results: [],
                userTeam: '',
                currentMatchday: 1,
                totalMatchdays: 15,
                userProfile: { logo: '', email: '' },
                userForm: [],
                stats: { totalGS: 0, totalGA: 0 },

                async init() {
                    const { data: { user } } = await _supabase.auth.getUser();
                    if (!user) { window.location.href = 'signin.html'; return; }
                    this.userProfile.email = user.email;

                    // Fetch League
                    const { data: leagueData } = await _supabase.from('leagues').select('*').limit(1).single();
                    if (leagueData) this.activeLeague = leagueData;

                    // Fetch Standings
                    const { data: standData } = await _supabase.from('standings').select('*').order('points', { ascending: false });
                    if (standData) {
                        this.standings = standData.map(i => ({ 
                            name: i.team_name, logo: i.logo_url, played: i.played, won: i.won, drawn: i.drawn, lost: i.lost, gs: i.gs, ga: i.ga, gd: i.gd, points: i.points 
                        }));
                        const mine = standData.find(t => t.user_id === user.id);
                        if (mine) {
                            this.userTeam = mine.team_name;
                            this.userProfile.logo = mine.logo_url;
                        }
                    }

                    // Fetch Results for Insights
                    const { data: resData } = await _supabase.from('results').select('*').order('created_at', { ascending: false });
                    if (resData) {
                        this.results = resData;
                        this.calculateStats();
                    }
                },

                async fetchFixtures() {
                    const { data } = await _supabase.from('fixtures').select('*').eq('matchday', this.currentMatchday);
                    if (data) this.fixtures = data;
                },

                calculateStats() {
                    let gs = 0, ga = 0, form = [];
                    this.results.forEach(r => {
                        let isHome = r.home_name === this.userTeam;
                        let isAway = r.away_name === this.userTeam;
                        if (isHome || isAway) {
                            let my = isHome ? r.h_score : r.a_score;
                            let op = isHome ? r.a_score : r.h_score;
                            gs += my; ga += op;
                            if (form.length < 5) form.push(my > op ? 'W' : my === op ? 'D' : 'L');
                        }
                    });
                    this.stats.totalGS = gs;
                    this.stats.totalGA = ga;
                    this.userForm = form;
                },

                async uploadLogo(e) {
                    const file = e.target.files[0];
                    const fileName = `${Date.now()}`;
                    await _supabase.storage.from('logos').upload(fileName, file);
                    const url = `https://irzgzyfscoosvixwvfhx.supabase.co/storage/v1/object/public/logos/${fileName}`;
                    await _supabase.from('standings').update({ logo_url: url }).eq('team_name', this.userTeam);
                    location.reload();
                },

                async logout() {
                    await _supabase.auth.signOut();
                    window.location.href = 'signin.html';
                }
            }
        }
    </script>
</body>
</html>
