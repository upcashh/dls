<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - League Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0a0f1a] text-white min-h-screen p-6" x-data="adminPanel()">

    <div class="max-w-5xl mx-auto">
        <header class="mb-10">
            <h1 class="text-3xl font-bold text-[#00ff85]">League Administration</h1>
            <p class="text-gray-400">Create leagues and assign teams from userinfo.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <section class="bg-white/5 p-6 rounded-2xl border border-white/10">
                <h2 class="text-xl font-semibold mb-6 text-[#00ff85]">1. Create New League</h2>
                <div class="space-y-4">
                    <input type="text" x-model="form.name" placeholder="League Name (e.g. Pro Series)" class="w-full bg-[#161b26] p-3 rounded-lg border border-white/10">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" x-model="form.season" placeholder="Season #" class="bg-[#161b26] p-3 rounded-lg border border-white/10">
                        <input type="number" x-model="form.slots" placeholder="Total Slots" class="bg-[#161b26] p-3 rounded-lg border border-white/10">
                    </div>
                    <input type="text" x-model="form.prize" placeholder="Prize Pool (e.g. $500)" class="w-full bg-[#161b26] p-3 rounded-lg border border-white/10">
                    <button @click="saveLeague" class="w-full bg-[#00ff85] text-black font-bold py-3 rounded-lg hover:scale-[1.02] transition">Create League</button>
                </div>
            </section>

            <section class="bg-white/5 p-6 rounded-2xl border border-white/10">
                <h2 class="text-xl font-semibold mb-6 text-blue-400">2. Add Team to League</h2>
                <div class="space-y-4">
                    <label class="text-xs text-gray-500 uppercase font-bold">Target League</label>
                    <select x-model="selectedLeagueId" class="w-full bg-[#161b26] p-3 rounded-lg border border-white/10">
                        <option value="">Select a League...</option>
                        <template x-for="l in leagues" :key="l.id">
                            <option :value="l.id" x-text="l.name + ' (S' + l.season_number + ')'"></option>
                        </template>
                    </select>

                    <label class="text-xs text-gray-500 uppercase font-bold">Available Team</label>
                    <select x-model="selectedTeamEmail" class="w-full bg-[#161b26] p-3 rounded-lg border border-white/10">
                        <option value="">Select Team from Userinfo...</option>
                        <template x-for="u in users" :key="u.email">
                            <option :value="u.email" x-text="u.team_name"></option>
                        </template>
                    </select>

                    <button @click="assignTeam" class="w-full bg-blue-500 text-white font-bold py-3 rounded-lg hover:scale-[1.02] transition">Confirm Assignment</button>
                </div>
            </section>

        </div>

        <section class="mt-10">
            <h2 class="text-xl font-semibold mb-4 text-gray-300">Active Leagues</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <template x-for="l in leagues" :key="l.id">
                    <div class="bg-white/5 border border-white/10 p-4 rounded-xl">
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold text-lg" x-text="l.name"></h3>
                            <span class="text-[10px] bg-[#00ff85]/20 text-[#00ff85] px-2 py-1 rounded" x-text="l.status"></span>
                        </div>
                        <p class="text-sm text-gray-400" x-text="'Season ' + l.season_number"></p>
                        <div class="mt-4 flex justify-between text-xs border-t border-white/5 pt-3">
                            <span>Prize: <b x-text="l.prize_pool"></b></span>
                            <span>Slots: <b x-text="l.total_slots"></b></span>
                        </div>
                    </div>
                </template>
            </div>
        </section>
    </div>

    <script>
        const _supabase = https://irzgzyfscoosvixwvfhx.supabase.co', 'sb_publishable_5WjuPG6Wg96_ySp0DcDuTw_JTGWxSJh');

        function adminPanel() {
            return {
                leagues: [],
                users: [],
                form: { name: '', season: 1, slots: 16, prize: '' },
                selectedLeagueId: '',
                selectedTeamEmail: '',

                async init() {
                    await this.loadData();
                },

                async loadData() {
                    const { data: L } = await _supabase.from('leagues').select('*').order('created_at', { ascending: false });
                    const { data: U } = await _supabase.from('userinfo').select('email, team_name, team_logo');
                    this.leagues = L || [];
                    this.users = U || [];
                },

                async saveLeague() {
                    const { error } = await _supabase.from('leagues').insert([{
                        name: this.form.name,
                        season_number: this.form.season,
                        total_slots: this.form.slots,
                        prize_pool: this.form.prize,
                        status: 'Registration'
                    }]);
                    
                    if (error) alert(error.message);
                    else {
                        alert("League Created!");
                        this.loadData();
                        this.form.name = '';
                    }
                },

                async assignTeam() {
                    if (!this.selectedLeagueId || !this.selectedTeamEmail) return alert("Select both League and Team");
                    
                    // Note: You need a table called 'league_members' for this.
                    // If you don't have it, create it with columns: league_id, team_name, team_logo
                    const team = this.users.find(u => u.email === this.selectedTeamEmail);
                    
                    const { error } = await _supabase.from('league_members').insert([{
                        league_id: this.selectedLeagueId,
                        team_name: team.team_name,
                        team_logo: team.team_logo
                    }]);

                    if (error) alert("Error: Make sure 'league_members' table exists!");
                    else alert(team.team_name + " added to league!");
                }
            }
        }
    </script>
</body>
</html>
