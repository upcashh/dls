<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0f1a">
    <title>DLS26 | Command Center Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #0a0f1a; font-family: 'DM Sans', sans-serif; color: white; overflow-x: hidden; }
        .outfit { font-family: 'Outfit', sans-serif; }
        
        .glass-card { 
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%); 
            border: 1px solid rgba(0, 255, 133, 0.1);
        }

        .nav-active { 
            color: #00ff85 !important; 
            transform: translateY(-4px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .nav-active svg { filter: drop-shadow(0 0 8px #00ff85); }

        .form-box { width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; }
        .form-box-lg { width: 30px; height: 30px; font-size: 14px; }
        .form-w { background: #00ff85; color: #0a0f1a; }
        .form-d { background: #ffcc00; color: #0a0f1a; }
        .form-l { background: #ff4d4d; color: white; }

        .skeleton {
            background: linear-gradient(90deg, #111827 25%, #1f2937 50%, #111827 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .fade-in-scroll { animation: fadeInUp 0.6s ease forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        [x-cloak] { display: none !important; }
        .logo-circle-md { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .col-stat { width: 22px; text-align: center; }
        .col-pts { width: 30px; text-align: center; }
        
        .user-row-highlight {
            background: rgba(0, 255, 133, 0.08) !important;
            border-left: 3px solid #00ff85 !important;
        }
    </style>
</head>
<body x-data="leagueApp()" x-init="init()" class="pb-24">

    <header class="bg-[#0a0f1a] border-b border-[#00ff8526] sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="leading-none">
                <span class="outfit text-white text-xl font-900 tracking-tighter uppercase">DLS<span class="text-[#00ff85]">26</span></span>
                <span class="block text-[7px] tracking-[0.4em] font-bold text-[#00ff85] opacity-80 uppercase">Elite Protocol</span>
            </div>
            <div class="flex items-center space-x-2">
                <div class="h-2 w-2 rounded-full bg-[#00ff85] animate-pulse"></div>
                <span class="text-[9px] font-black text-white/40 uppercase tracking-widest" x-text="userTeam"></span>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 pt-4">

        <template x-if="loading">
            <div class="space-y-4">
                <div class="h-40 skeleton rounded-3xl"></div>
                <div class="h-20 skeleton rounded-xl"></div>
                <div class="h-64 skeleton rounded-3xl"></div>
            </div>
        </template>

        <div x-show="!loading" class="fade-in-scroll">
            
            <div x-show="view === 'home'" x-cloak>
                <div class="glass-card rounded-2xl overflow-x-auto no-scrollbar border border-[#00ff8520]">
                    <table class="w-full text-left min-w-[600px]">
                        <thead class="bg-black/40 border-b border-white/5 text-white/30 font-bold text-[8px] uppercase">
                            <tr>
                                <th class="py-4 pl-3 w-8 text-center">Pos</th>
                                <th class="py-4 pl-2">Club</th>
                                <th class="py-4 col-stat">MP</th>
                                <th class="py-4 col-stat">W</th>
                                <th class="py-4 col-stat">D</th>
                                <th class="py-4 col-stat">L</th>
                                <th class="py-4 col-stat">GS</th>
                                <th class="py-4 col-stat">GA</th>
                                <th class="py-4 col-stat">GD</th>
                                <th class="py-4 col-pts text-[#00ff85]">PTS</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-white/5 text-[11px]">
                            <template x-for="(team, index) in standings" :key="index">
                                <tr :class="team.name === userTeam ? 'user-row-highlight' : ''">
                                    <td class="py-4 pl-3 font-black text-white/20 text-center" x-text="index + 1"></td>
                                    <td class="py-4 pl-2 flex items-center space-x-3">
                                        <img :src="team.logo" class="logo-circle-md border border-white/5">
                                        <span class="font-bold uppercase truncate" :class="team.name === userTeam ? 'text-[#00ff85]' : ''" x-text="team.name"></span>
                                    </td>
                                    <td class="text-center text-white/40" x-text="team.played"></td>
                                    <td class="text-center text-white/60" x-text="team.won"></td>
                                    <td class="text-center text-white/60" x-text="team.drawn"></td>
                                    <td class="text-center text-white/60" x-text="team.lost"></td>
                                    <td class="text-center text-white/30" x-text="team.gs"></td>
                                    <td class="text-center text-white/30" x-text="team.ga"></td>
                                    <td class="text-center font-bold" :class="team.gd >= 0 ? 'text-white/60' : 'text-red-400'" x-text="(team.gd > 0 ? '+' : '') + team.gd"></td>
                                    <td class="text-center font-black text-[#00ff85]" x-text="team.points"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>

            <div x-show="view === 'fixtures'" x-cloak>
                <div class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 py-2">
                    <template x-for="n in totalMatchdays">
                        <button @click="currentMatchday = n; fetchFixtures()" 
                                :class="currentMatchday === n ? 'bg-[#00ff85] text-[#0a0f1a]' : 'bg-white/5 text-white/40'"
                                class="px-5 py-2 rounded-xl text-[10px] font-black transition-all flex-shrink-0" x-text="'MD ' + n"></button>
                    </template>
                </div>
                <div class="space-y-3">
                    <template x-for="match in fixtures" :key="match.id">
                        <div class="glass-card p-4 rounded-2xl flex items-center justify-between border-l-2 border-[#00ff85]">
                            <div class="flex flex-col items-center w-1/3 space-y-1">
                                <img :src="match.home_logo" class="logo-circle-md">
                                <span class="text-[9px] font-black uppercase truncate w-full text-center" x-text="match.home_team"></span>
                            </div>
                            <div class="text-center px-4">
                                <span class="text-[10px] font-black text-[#00ff85] tracking-widest uppercase" x-text="match.match_date"></span>
                            </div>
                            <div class="flex flex-col items-center w-1/3 space-y-1">
                                <img :src="match.away_logo" class="logo-circle-md">
                                <span class="text-[9px] font-black uppercase truncate w-full text-center" x-text="match.away_team"></span>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="view === 'results'" x-cloak>
                <div class="space-y-3">
                    <template x-for="res in results" :key="res.id">
                        <div class="glass-card p-4 rounded-xl flex items-center justify-between">
                            <div class="flex items-center space-x-3 w-1/3">
                                <img :src="res.home_logo" class="logo-circle-md">
                                <span class="text-[9px] font-bold uppercase truncate" x-text="res.home_name"></span>
                            </div>
                            <div class="flex items-center space-x-2 bg-[#00ff8510] px-3 py-1 rounded-lg border border-[#00ff8520]">
                                <span class="text-[#00ff85] font-black text-sm" x-text="res.h_score"></span>
                                <span class="text-white/20">-</span>
                                <span class="text-[#00ff85] font-black text-sm" x-text="res.a_score"></span>
                            </div>
                            <div class="flex items-center space-x-3 w-1/3 justify-end">
                                <span class="text-[9px] font-bold uppercase truncate text-right" x-text="res.away_name"></span>
                                <img :src="res.away_logo" class="logo-circle-md">
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="view === 'insights'" x-cloak>
                <div class="mb-6">
                    <p class="text-[10px] uppercase font-black text-[#00ff85] mb-4 tracking-widest">Performance Form</p>
                    <div class="flex items-end space-x-2 bg-white/5 p-4 rounded-2xl">
                        <template x-for="(f, i) in userForm" :key="i">
                            <div class="form-box" :class="[f === 'W' ? 'form-w' : f === 'D' ? 'form-d' : 'form-l', i === 4 ? 'form-box-lg' : '']" x-text="f"></div>
                        </template>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="glass-card p-4 rounded-2xl border-l-2 border-l-[#00ff85]">
                        <p class="text-[9px] uppercase font-black text-white/30">Total Scored (GS)</p>
                        <p class="text-2xl font-black text-[#00ff85]" x-text="stats.totalGS"></p>
                    </div>
                    <div class="glass-card p-4 rounded-2xl border-l-2 border-l-red-500">
                        <p class="text-[9px] uppercase font-black text-white/30">Total Conceded (GA)</p>
                        <p class="text-2xl font-black text-red-500" x-text="stats.totalGA"></p>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="glass-card p-5 rounded-3xl">
                        <div class="flex justify-between border-b border-white/5 pb-4 mb-4">
                            <div>
                                <p class="text-[10px] uppercase text-white/40">Biggest Victory</p>
                                <p class="text-sm font-black text-[#00ff85]" x-text="stats.biggestWin"></p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] uppercase text-white/40">Biggest Defeat</p>
                                <p class="text-sm font-black text-red-500" x-text="stats.biggestLoss"></p>
                            </div>
                        </div>
                        <div class="flex justify-between">
                            <div>
                                <p class="text-[10px] uppercase text-white/40">All-Time GD</p>
                                <p class="text-lg font-black" :class="stats.totalGS - stats.totalGA >= 0 ? 'text-white' : 'text-red-500'" x-text="stats.totalGS - stats.totalGA"></p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] uppercase text-white/40">Best Pos.</p>
                                <p class="text-lg font-black text-[#00ff85]">1st</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div x-show="view === 'profile'" x-cloak>
                <div class="glass-card rounded-3xl p-6 mb-6">
                    <div class="flex flex-col items-center text-center mb-8">
                        <div class="relative mb-4">
                            <img :src="userProfile.logo" class="w-24 h-24 rounded-full border-2 border-[#00ff85] p-1 object-cover">
                            <label class="absolute bottom-0 right-0 bg-[#00ff85] p-2 rounded-full text-[#0a0f1a] cursor-pointer shadow-lg">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M4 5a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2V7a2 2 0 00-2-2h-1.586a1 1 0 01-.707-.293l-1.121-1.121A2 2 0 0011.172 3H8.828a2 2 0 00-1.414.586L6.293 4.707A1 1 0 015.586 5H4zm6 9a3 3 0 100-6 3 3 0 000 6z"/></svg>
                                <input type="file" @change="uploadLogo" class="hidden" accept="image/*">
                            </label>
                        </div>
                        <h2 class="outfit font-900 text-2xl uppercase text-white" x-text="userTeam"></h2>
                        <div class="flex items-center space-x-2 text-[#00ff85] text-[10px] font-black uppercase tracking-widest mt-1">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                            <span>Verified Competitor</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 gap-3 mb-8">
                        <div class="bg-white/5 p-4 rounded-2xl flex items-center space-x-4 border border-white/5">
                            <div class="p-2 bg-[#00ff851a] rounded-lg text-[#00ff85]">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                            </div>
                            <div class="overflow-hidden">
                                <p class="text-[8px] uppercase font-black text-white/30">Manager / User</p>
                                <p class="text-sm font-bold truncate" x-text="userProfile.username"></p>
                            </div>
                        </div>
                        <div class="bg-white/5 p-4 rounded-2xl flex items-center space-x-4 border border-white/5">
                            <div class="p-2 bg-[#00ff851a] rounded-lg text-[#00ff85]">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                            </div>
                            <div class="overflow-hidden">
                                <p class="text-[8px] uppercase font-black text-white/30">Email Address</p>
                                <p class="text-sm font-bold truncate" x-text="userProfile.email"></p>
                            </div>
                        </div>
                        <div class="bg-white/5 p-4 rounded-2xl flex items-center space-x-4 border border-white/5">
                            <div class="p-2 bg-[#00ff851a] rounded-lg text-[#00ff85]">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            </div>
                            <div>
                                <p class="text-[8px] uppercase font-black text-white/30">Protocol Joined</p>
                                <p class="text-sm font-bold" x-text="userProfile.joinedDate"></p>
                            </div>
                        </div>
                    </div>

                    <p class="text-[10px] uppercase font-black text-[#00ff85] mb-4 tracking-[0.2em]">Active History</p>
                    <div class="space-y-4">
                        <template x-for="lg in userLeagues">
                            <div class="glass-card p-5 rounded-2xl border-l-4" :class="lg.status === 'active' ? 'border-l-[#00ff85]' : 'border-l-white/20'">
                                <div class="flex justify-between items-start mb-3">
                                    <h3 class="font-black uppercase text-sm" x-text="lg.name"></h3>
                                    <span class="text-[8px] px-2 py-1 rounded font-black uppercase" :class="lg.status === 'active' ? 'bg-[#00ff85] text-[#0a0f1a]' : 'bg-white/10 text-white/40'" x-text="lg.status"></span>
                                </div>
                                <div class="flex justify-between items-end">
                                    <div class="flex space-x-4">
                                        <div>
                                            <p class="text-[8px] text-white/30 uppercase font-black">Rank</p>
                                            <p class="text-lg font-black text-[#00ff85]">#<span x-text="lg.rank"></span></p>
                                        </div>
                                        <div>
                                            <p class="text-[8px] text-white/30 uppercase font-black">Entries</p>
                                            <p class="text-lg font-black" x-text="lg.teams"></p>
                                        </div>
                                    </div>
                                    <div class="h-8 w-8 bg-white/5 rounded flex items-center justify-center">
                                        <svg class="w-4 h-4 text-white/20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <button @click="confirmLogout()" class="w-full mt-10 py-4 bg-red-600/10 border border-red-600/30 text-red-500 rounded-2xl outfit font-900 uppercase text-xs tracking-widest flex items-center justify-center space-x-3 active:scale-95 transition-all">
                        <svg class="w-5 h-5 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        <span>Terminate Secure Session</span>
                    </button>
                </div>
            </div>

        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0a0f1a]/95 backdrop-blur-xl border-t border-white/5 flex justify-around items-center h-20 z-50 px-2 pb-2">
        <button @click="view = 'home'" :class="view === 'home' ? 'nav-active' : ''" class="flex flex-col items-center text-white/30 transition-all w-1/5">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
            <span class="text-[7px] font-black uppercase tracking-tighter">Standings</span>
        </button>
        <button @click="view = 'fixtures'; fetchFixtures()" :class="view === 'fixtures' ? 'nav-active' : ''" class="flex flex-col items-center text-white/30 transition-all w-1/5">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[7px] font-black uppercase tracking-tighter">Fixtures</span>
        </button>
        <button @click="view = 'results'" :class="view === 'results' ? 'nav-active' : ''" class="flex flex-col items-center text-white/30 transition-all w-1/5">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[7px] font-black uppercase tracking-tighter">Results</span>
        </button>
        <button @click="view = 'insights'" :class="view === 'insights' ? 'nav-active' : ''" class="flex flex-col items-center text-white/30 transition-all w-1/5">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            <span class="text-[7px] font-black uppercase tracking-tighter">Insights</span>
        </button>
        <button @click="view = 'profile'" :class="view === 'profile' ? 'nav-active' : ''" class="flex flex-col items-center text-white/30 transition-all w-1/5">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-[7px] font-black uppercase tracking-tighter">Profile</span>
        </button>
    </nav>

    <script>
        const _supabase = supabase.createClient('https://irzgzyfscoosvixwvfhx.supabase.co', 'sb_publishable_5WjuPG6Wg96_ySp0DcDuTw_JTGWxSJh');

        function leagueApp() {
            return {
                view: 'home',
                loading: true,
                userTeam: '',
                userId: null,
                standings: [],
                fixtures: [],
                results: [],
                totalMatchdays: 0,
                currentMatchday: 1,
                userProfile: { logo: '', email: '', username: 'User_X', joinedDate: '...' },
                userForm: [],
                userLeagues: [],
                stats: { totalGS: 0, totalGA: 0, biggestWin: 'N/A', biggestLoss: 'N/A' },

                async init() {
                    const { data: { user } } = await _supabase.auth.getUser();
                    if (!user) { window.location.href = 'signin.html'; return; }
                    this.userId = user.id;
                    this.userProfile.email = user.email;
                    this.userProfile.joinedDate = new Date(user.created_at).toLocaleDateString('en-GB');

                    // 1. Standings & User Team Identification
                    const { data: standData } = await _supabase.from('standings').select('*').order('points', { ascending: false }).order('gd', { ascending: false });
                    if (standData) {
                        this.standings = standData;
                        const userRow = standData.find(t => t.user_id === user.id);
                        if (userRow) {
                            this.userTeam = userRow.team_name;
                            this.userProfile.logo = userRow.logo_url;
                            this.userProfile.username = userRow.team_name;
                        }
                    }

                    // 2. Results & Insight Calculation
                    const { data: resData } = await _supabase.from('results').select('*').order('created_at', { ascending: false });
                    if (resData) {
                        this.results = resData;
                        this.calculateTeamStats(resData);
                    }

                    // 3. Mock League History (Replace with actual join table if exists)
                    this.userLeagues = [
                        { name: 'Elite Premier League', status: 'active', rank: 3, teams: 20 },
                        { name: 'Global Pro Cup', status: 'completed', rank: 1, teams: 16 }
                    ];

                    this.loading = false;
                },

                calculateTeamStats(results) {
                    let gs = 0, ga = 0, bWinVal = -1, bLossVal = -1;
                    let bWinStr = 'N/A', bLossStr = 'N/A';
                    let formArr = [];

                    results.forEach(r => {
                        let isHome = r.home_name === this.userTeam;
                        let isAway = r.away_name === this.userTeam;

                        if (isHome || isAway) {
                            let myScore = isHome ? r.h_score : r.a_score;
                            let opScore = isHome ? r.a_score : r.h_score;
                            let opName = isHome ? r.away_name : r.home_name;

                            gs += myScore; ga += opScore;

                            // Form Logic (Take last 5)
                            if(formArr.length < 5) {
                                if(myScore > opScore) formArr.push('W');
                                else if(myScore === opScore) formArr.push('D');
                                else formArr.push('L');
                            }

                            // Biggest Win
                            if(myScore > opScore && (myScore - opScore) > bWinVal) {
                                bWinVal = myScore - opScore;
                                bWinStr = `${myScore}-${opScore} vs ${opName}`;
                            }
                            // Biggest Loss
                            if(opScore > myScore && (opScore - myScore) > bLossVal) {
                                bLossVal = opScore - myScore;
                                bLossStr = `${myScore}-${opScore} vs ${opName}`;
                            }
                        }
                    });

                    this.userForm = formArr.reverse();
                    this.stats.totalGS = gs;
                    this.stats.totalGA = ga;
                    this.stats.biggestWin = bWinStr;
                    this.stats.biggestLoss = bLossStr;
                },

                async uploadLogo(e) {
                    const file = e.target.files[0];
                    if (!file) return;

                    const fileExt = file.name.split('.').pop();
                    const fileName = `${this.userId}-${Date.now()}.${fileExt}`;
                    
                    try {
                        // 1. Upload to Storage
                        const { error: uploadError } = await _supabase.storage
                            .from('logos')
                            .upload(fileName, file, { upsert: true });

                        if (uploadError) throw uploadError;

                        const publicUrl = `https://irzgzyfscoosvixwvfhx.supabase.co/storage/v1/object/public/logos/${fileName}`;

                        // 2. Update Table
                        const { error: dbError } = await _supabase.from('standings')
                            .update({ logo_url: publicUrl })
                            .eq('user_id', this.userId);

                        if (dbError) throw dbError;

                        this.userProfile.logo = publicUrl;
                        alert("Identity Updated!");
                        location.reload();
                    } catch (err) {
                        alert(err.message);
                    }
                },

                async fetchFixtures() {
                    const { data } = await _supabase.from('fixtures').select('*').eq('matchday', this.currentMatchday);
                    if (data) this.fixtures = data;
                },

                confirmLogout() {
                    if(confirm("DANGER: Terminate protocol session?")) {
                        _supabase.auth.signOut().then(() => window.location.href = 'signin.html');
                    }
                }
            }
        }
    </script>
</body>
