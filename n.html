<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - League Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0a0f1a] text-white min-h-screen p-6" x-data="adminPanel()">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold text-[#00ff85] mb-8">League Control Center</h1>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            <div class="bg-white/5 p-6 rounded-2xl border border-white/10">
                <h2 class="text-xl font-bold mb-4 text-[#00ff85]">Create New League</h2>
                <div class="space-y-3">
                    <input type="text" x-model="form.name" placeholder="League Name" class="w-full bg-[#161b26] p-3 rounded-xl border border-white/10">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" x-model="form.season" placeholder="Season #" class="bg-[#161b26] p-3 rounded-xl border border-white/10">
                        <input type="number" x-model="form.slots" placeholder="Slots" class="bg-[#161b26] p-3 rounded-xl border border-white/10">
                    </div>
                    <input type="text" x-model="form.prize" placeholder="Prize Pool" class="w-full bg-[#161b26] p-3 rounded-xl border border-white/10">
                    <button @click="saveLeague" class="w-full bg-[#00ff85] text-black font-black py-3 rounded-xl">CREATE LEAGUE</button>
                </div>
            </div>

            <div class="bg-white/5 p-6 rounded-2xl border border-white/10">
                <h2 class="text-xl font-bold mb-4 text-blue-400">Add Team to League</h2>
                <div class="space-y-3">
                    <select x-model="selectedLeagueId" class="w-full bg-[#161b26] p-3 rounded-xl border border-white/10">
                        <option value="">Select League...</option>
                        <template x-for="l in leagues" :key="l.id">
                            <option :value="l.id" x-text="l.name"></option>
                        </template>
                    </select>
                    <select x-model="selectedTeamEmail" class="w-full bg-[#161b26] p-3 rounded-xl border border-white/10">
                        <option value="">Select Team from Userinfo...</option>
                        <template x-for="u in users" :key="u.email">
                            <option :value="u.email" x-text="u.team_name"></option>
                        </template>
                    </select>
                    <button @click="assignTeam" class="w-full bg-blue-500 text-white font-black py-3 rounded-xl">ASSIGN TEAM</button>
                </div>
            </div>
        </div>

        <div class="bg-white/5 rounded-2xl border border-white/10 overflow-hidden">
            <div class="p-4 bg-white/5 font-bold border-b border-white/10">Current League Rosters</div>
            <table class="w-full text-left">
                <thead class="text-xs text-gray-500 uppercase bg-black/20">
                    <tr>
                        <th class="p-4">League</th>
                        <th class="p-4">Team</th>
                        <th class="p-4">Logo</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="m in members" :key="m.id">
                        <tr class="border-t border-white/5">
                            <td class="p-4 font-bold" x-text="getLeagueName(m.league_id)"></td>
                            <td class="p-4" x-text="m.team_name"></td>
                            <td class="p-4"><img :src="m.team_logo" class="w-8 h-8 rounded-full border border-[#00ff85]"></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Use the credentials from your project
        const _sb = supabase.createClient('https://irzgzyfscoosvixwvfhx.supabase.co', 'YOUR_ANON_KEY');

        function adminPanel() {
            return {
                leagues: [], users: [], members: [],
                selectedLeagueId: '', selectedTeamEmail: '',
                form: { name: '', season: 1, slots: 16, prize: '' },

                async init() {
                    await this.load();
                },
                async load() {
                    const { data: L } = await _sb.from('leagues').select('*');
                    const { data: U } = await _sb.from('userinfo').select('email, team_name, team_logo');
                    const { data: M } = await _sb.from('league_members').select('*');
                    this.leagues = L || [];
                    this.users = U || [];
                    this.members = M || [];
                },
                getLeagueName(id) {
                    const l = this.leagues.find(x => x.id === id);
                    return l ? l.name : 'Unknown';
                },
                async saveLeague() {
                    await _sb.from('leagues').insert([{
                        name: this.form.name,
                        season_number: this.form.season,
                        total_slots: this.form.slots,
                        prize_pool: this.form.prize,
                        status: 'Active'
                    }]);
                    this.form.name = '';
                    await this.load();
                },
                async assignTeam() {
                    const team = this.users.find(u => u.email === this.selectedTeamEmail);
                    const { error } = await _sb.from('league_members').insert([{
                        league_id: this.selectedLeagueId,
                        team_name: team.team_name,
                        team_logo: team.team_logo
                    }]);
                    if (error) alert(error.message);
                    else { alert("Team Added!"); await this.load(); }
                }
            }
        }
    </script>
</body>
</html>
