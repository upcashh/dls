<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0f1a">
    <title>DLS26 | Command Center Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #0a0f1a; font-family: 'DM Sans', sans-serif; color: white; overflow-x: hidden; }
        .outfit { font-family: 'Outfit', sans-serif; }
        
        .glass-card { 
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%); 
            border: 1px solid rgba(0, 255, 133, 0.1);
        }

        .nav-active { 
            color: #00ff85 !important; 
            transform: translateY(-4px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(0, 255, 133, 0.05);
            border-radius: 12px;
        }

        .form-box { width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; }
        .form-box-lg { width: 30px; height: 30px; font-size: 14px; }
        .form-w { background: #00ff85; color: #0a0f1a; }
        .form-d { background: #ffcc00; color: #0a0f1a; }
        .form-l { background: #ff4d4d; color: white; }

        .skeleton {
            background: linear-gradient(90deg, #111827 25%, #1f2937 50%, #111827 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .fade-in-scroll { animation: fadeInUp 0.6s ease forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        [x-cloak] { display: none !important; }
        
        .logo-circle-md { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: #1a2333; }
        .col-stat { width: 35px; text-align: center; }
        .col-pts { width: 45px; text-align: center; }
        
        .user-row-highlight {
            background: rgba(0, 255, 133, 0.12) !important;
            border-left: 4px solid #00ff85 !important;
        }

        .table-container { 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch;
        }
        table { border-collapse: collapse; width: 100%; min-width: 550px; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body x-data="leagueApp()" x-init="init()" class="pb-24">

    <header class="bg-[#0a0f1a] border-b border-[#00ff8526] sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="leading-none">
                <span class="outfit text-white text-xl font-900 tracking-tighter uppercase">DLS<span class="text-[#00ff85]">26</span></span>
                <span class="block text-[7px] tracking-[0.4em] font-bold text-[#00ff85] opacity-80 uppercase">Elite Protocol</span>
            </div>
            <div class="flex items-center space-x-2">
                <div class="h-2 w-2 rounded-full bg-[#00ff85] animate-pulse"></div>
                <span class="text-[9px] font-black text-white/40 uppercase tracking-widest" x-text="userTeam || 'Syncing...'"></span>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 pt-4">

        <template x-if="loading">
            <div class="space-y-4">
                <div class="h-10 skeleton rounded-xl w-1/3"></div>
                <div class="h-64 skeleton rounded-3xl"></div>
            </div>
        </template>

        <div x-show="!loading" class="fade-in-scroll">
            
            <div x-show="view === 'home'" x-cloak>
                <div class="flex items-center justify-between mb-4 px-1">
                    <h2 class="outfit font-900 text-lg uppercase tracking-tighter">League <span class="text-[#00ff85]">Standings</span></h2>
                </div>
                <div class="glass-card rounded-2xl table-container">
                    <table>
                        <thead class="bg-black/40 border-b border-white/5 text-white/30 font-bold text-[9px] uppercase">
                            <tr>
                                <th class="py-4 pl-4 w-10">Pos</th>
                                <th class="py-4 pl-2 text-left">Club</th>
                                <th class="col-stat">MP</th>
                                <th class="col-stat">W</th>
                                <th class="col-stat">D</th>
                                <th class="col-stat">L</th>
                                <th class="col-stat text-white/10">GS</th>
                                <th class="col-stat text-white/10">GA</th>
                                <th class="col-stat">GD</th>
                                <th class="col-pts text-[#00ff85]">PTS</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-white/5 text-[11px]">
                            <template x-for="(team, index) in standings" :key="index">
                                <tr :class="team.team_name === userTeam ? 'user-row-highlight' : ''">
                                    <td class="py-5 pl-4 font-black text-white/20 text-center" x-text="index + 1"></td>
                                    <td class="py-3 pl-2">
                                        <div class="flex items-center space-x-3">
                                            <img :src="team.logo_url || 'https://via.placeholder.com/50/111827/00ff85?text=FC'" 
                                                 class="logo-circle-md border border-white/10"
                                                 @error="$el.src='https://via.placeholder.com/50/111827/00ff85?text=FC'">
                                            <span class="font-bold uppercase tracking-tight whitespace-nowrap" 
                                                  :class="team.team_name === userTeam ? 'text-[#00ff85]' : 'text-white'" 
                                                  x-text="team.team_name"></span>
                                        </div>
                                    </td>
                                    <td class="col-stat text-white/40" x-text="team.played"></td>
                                    <td class="col-stat text-white/60" x-text="team.won"></td>
                                    <td class="col-stat text-white/60" x-text="team.drawn"></td>
                                    <td class="col-stat text-white/60" x-text="team.lost"></td>
                                    <td class="col-stat text-white/20" x-text="team.gs"></td>
                                    <td class="col-stat text-white/20" x-text="team.ga"></td>
                                    <td class="col-stat font-bold" :class="team.gd >= 0 ? 'text-white/60' : 'text-red-400'" x-text="(team.gd > 0 ? '+' : '') + team.gd"></td>
                                    <td class="col-pts font-black text-[#00ff85]" x-text="team.points"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>

            <div x-show="view === 'fixtures'" x-cloak>
                <div class="flex items-center justify-between mb-4">
                    <h2 class="outfit font-900 text-lg uppercase tracking-tighter">Matchday <span class="text-[#00ff85]" x-text="currentMatchday"></span></h2>
                </div>
                
                <div class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 py-2">
                    <template x-for="n in totalMatchdays">
                        <button @click="currentMatchday = n; fetchFixtures()" 
                                :class="currentMatchday === n ? 'bg-[#00ff85] text-[#0a0f1a] scale-105' : 'bg-white/5 text-white/40'"
                                class="px-5 py-2.5 rounded-xl text-[10px] font-black transition-all flex-shrink-0 uppercase" x-text="'MD ' + n"></button>
                    </template>
                </div>

                <div class="space-y-3">
                    <template x-if="fixtures.length === 0">
                        <div class="glass-card p-10 rounded-2xl text-center text-white/20 uppercase font-black text-xs tracking-widest">
                            No Fixtures Scheduled for Matchday <span x-text="currentMatchday"></span>
                        </div>
                    </template>
                    <template x-for="match in fixtures" :key="match.id">
                        <div class="glass-card p-4 rounded-2xl border-l-2 border-[#00ff85]">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-[8px] font-black bg-[#00ff8520] text-[#00ff85] px-2 py-0.5 rounded uppercase">Matchday <span x-text="match.matchday || currentMatchday"></span></span>
                                <span class="text-[8px] font-bold text-white/30 uppercase" x-text="match.match_time || '20:00 GMT'"></span>
                            </div>
                            <div class="flex items-center justify-between">
                                <div class="flex flex-col items-center w-1/3 space-y-1">
                                    <img :src="match.home_logo" class="logo-circle-md" @error="$el.src='https://via.placeholder.com/50'">
                                    <span class="text-[9px] font-black uppercase truncate w-full text-center" x-text="match.home_team"></span>
                                </div>
                                <div class="text-center px-4">
                                    <span class="text-[10px] font-black text-[#00ff85] tracking-widest uppercase">VS</span>
                                </div>
                                <div class="flex flex-col items-center w-1/3 space-y-1">
                                    <img :src="match.away_logo" class="logo-circle-md" @error="$el.src='https://via.placeholder.com/50'">
                                    <span class="text-[9px] font-black uppercase truncate w-full text-center" x-text="match.away_team"></span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="view === 'results'" x-cloak>
                <div class="flex items-center justify-between mb-4 px-1">
                    <h2 class="outfit font-900 text-lg uppercase tracking-tighter">Recent <span class="text-[#00ff85]">Results</span></h2>
                </div>
                <div class="space-y-3">
                    <template x-for="res in results" :key="res.id">
                        <div class="glass-card p-4 rounded-xl flex items-center justify-between">
                            <div class="flex items-center space-x-3 w-1/3">
                                <img :src="res.home_logo" class="logo-circle-md" @error="$el.src='https://via.placeholder.com/50'">
                                <span class="text-[9px] font-bold uppercase truncate" x-text="res.home_name"></span>
                            </div>
                            <div class="flex items-center space-x-2 bg-[#00ff8510] px-3 py-1 rounded-lg border border-[#00ff8520]">
                                <span class="text-[#00ff85] font-black text-sm" x-text="res.h_score"></span>
                                <span class="text-white/20">-</span>
                                <span class="text-[#00ff85] font-black text-sm" x-text="res.a_score"></span>
                            </div>
                            <div class="flex items-center space-x-3 w-1/3 justify-end">
                                <span class="text-[9px] font-bold uppercase truncate text-right" x-text="res.away_name"></span>
                                <img :src="res.away_logo" class="logo-circle-md" @error="$el.src='https://via.placeholder.com/50'">
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="view === 'insights'" x-cloak>
                <div class="mb-6">
                    <p class="text-[10px] uppercase font-black text-[#00ff85] mb-4 tracking-widest">Performance Form</p>
                    <div class="flex items-end space-x-2 bg-white/5 p-4 rounded-2xl">
                        <template x-for="(f, i) in userForm" :key="i">
                            <div class="form-box" :class="[f === 'W' ? 'form-w' : f === 'D' ? 'form-d' : 'form-l', i === 4 ? 'form-box-lg' : '']" x-text="f"></div>
                        </template>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="glass-card p-4 rounded-2xl border-l-2 border-l-[#00ff85]">
                        <p class="text-[9px] uppercase font-black text-white/30">Total Scored (GS)</p>
                        <p class="text-2xl font-black text-[#00ff85]" x-text="stats.totalGS"></p>
                    </div>
                    <div class="glass-card p-4 rounded-2xl border-l-2 border-l-red-500">
                        <p class="text-[9px] uppercase font-black text-white/30">Total Conceded (GA)</p>
                        <p class="text-2xl font-black text-red-500" x-text="stats.totalGA"></p>
                    </div>
                </div>
                <div class="glass-card p-5 rounded-3xl">
                    <div class="flex justify-between border-b border-white/5 pb-4 mb-4">
                        <div>
                            <p class="text-[10px] uppercase text-white/40">Biggest Victory</p>
                            <p class="text-sm font-black text-[#00ff85]" x-text="stats.biggestWin"></p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] uppercase text-white/40">Biggest Defeat</p>
                            <p class="text-sm font-black text-red-500" x-text="stats.biggestLoss"></p>
                        </div>
                    </div>
                </div>
            </div>

            <div x-show="view === 'profile'" x-cloak>
                <div class="glass-card rounded-3xl p-6 mb-6 text-center">
                    <div class="relative inline-block mb-4">
                        <img :src="userProfile.logo || 'https://via.placeholder.com/100/111827/00ff85?text=FC'" class="w-24 h-24 rounded-full border-2 border-[#00ff85] p-1 object-cover">
                        <label class="absolute bottom-0 right-0 bg-[#00ff85] p-2 rounded-full text-[#0a0f1a] cursor-pointer shadow-lg border-2 border-[#0a0f1a]">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M4 5a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2V7a2 2 0 00-2-2h-1.586a1 1 0 01-.707-.293l-1.121-1.121A2 2 0 0011.172 3H8.828a2 2 0 00-1.414.586L6.293 4.707A1 1 0 015.586 5H4zm6 9a3 3 0 100-6 3 3 0 000 6z"/></svg>
                            <input type="file" @change="uploadLogo" class="hidden" accept="image/*">
                        </label>
                    </div>
                    
                    <h2 class="outfit font-900 text-2xl uppercase text-[#00ff85]" x-text="userTeam || 'Assigning Team...'"></h2>
                    <p class="text-[9px] font-black text-white/20 uppercase tracking-[0.3em] mt-1">Official Manager Profile</p>
                    
                    <div class="mt-8 space-y-3 text-left">
                        <div class="bg-white/5 p-4 rounded-xl border border-white/5 flex items-center space-x-4">
                            <div class="p-2 bg-[#00ff8510] rounded-lg">
                                <svg class="w-4 h-4 text-[#00ff85]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            </div>
                            <div>
                                <p class="text-[8px] uppercase font-black text-white/30">Club Name</p>
                                <p class="text-sm font-bold text-white uppercase" x-text="userTeam || 'Not Set'"></p>
                            </div>
                        </div>

                        <div class="bg-white/5 p-4 rounded-xl border border-white/5 flex items-center space-x-4">
                            <div class="p-2 bg-[#00ff8510] rounded-lg">
                                <svg class="w-4 h-4 text-[#00ff85]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            </div>
                            <div class="overflow-hidden">
                                <p class="text-[8px] uppercase font-black text-white/30">Account Email</p>
                                <p class="text-sm font-bold text-white/80 truncate" x-text="userProfile.email"></p>
                            </div>
                        </div>
                    </div>

                    <button @click="confirmLogout()" class="w-full mt-10 py-4 bg-red-600/10 border border-red-600/30 text-red-500 rounded-2xl outfit font-900 uppercase text-xs tracking-widest flex items-center justify-center space-x-3 active:bg-red-600/20 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        <span>Terminate Session</span>
                    </button>
                </div>
            </div>

        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0a0f1a]/95 backdrop-blur-xl border-t border-white/5 flex justify-around items-center h-20 z-50 px-2 pb-2">
        <button @click="view = 'home'" :class="view === 'home' ? 'nav-active' : ''" class="flex flex-col items-center text-white/30 transition-all w-1/5 py-2">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
            <span class="text-[7px] font-black uppercase tracking-tighter">Standings</span>
        </button>
        <button @click="view = 'fixtures'; fetchFixtures()" :class="view === 'fixtures' ? 'nav-active' : ''" class="flex flex-col items-center text-white/30 transition-all w-1/5 py-2">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[7px] font-black uppercase tracking-tighter">Fixtures</span>
        </button>
        <button @click="view = 'results'" :class="view === 'results' ? 'nav-active' : ''" class="flex flex-col items-center text-white/30 transition-all w-1/5 py-2">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[7px] font-black uppercase tracking-tighter">Results</span>
        </button>
        <button @click="view = 'insights'" :class="view === 'insights' ? 'nav-active' : ''" class="flex flex-col items-center text-white/30 transition-all w-1/5 py-2">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            <span class="text-[7px] font-black uppercase tracking-tighter">Insights</span>
        </button>
        <button @click="view = 'profile'" :class="view === 'profile' ? 'nav-active' : ''" class="flex flex-col items-center text-white/30 transition-all w-1/5 py-2">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-[7px] font-black uppercase tracking-tighter">Profile</span>
        </button>
    </nav>

    <script>
        const _supabase = supabase.createClient('https://irzgzyfscoosvixwvfhx.supabase.co', 'sb_publishable_5WjuPG6Wg96_ySp0DcDuTw_JTGWxSJh');

        function leagueApp() {
            return {
                view: 'home',
                loading: true,
                userTeam: '',
                userId: null,
                standings: [],
                fixtures: [],
                results: [],
                totalMatchdays: 15, // Expanded matchday support
                currentMatchday: 1,
                userProfile: { logo: '', email: '' },
                userForm: [],
                stats: { totalGS: 0, totalGA: 0, biggestWin: 'N/A', biggestLoss: 'N/A' },

                async init() {
                    const { data: { user } } = await _supabase.auth.getUser();
                    if (!user) { window.location.href = 'signin.html'; return; }
                    this.userId = user.id;
                    this.userProfile.email = user.email;

                    // 1. Fetch Standings & User Info
                    const { data: standData } = await _supabase.from('standings').select('*').order('points', { ascending: false });
                    if (standData) {
                        this.standings = standData;
                        const userRow = standData.find(t => t.user_id === user.id);
                        if (userRow) {
                            this.userTeam = userRow.team_name;
                            this.userProfile.logo = userRow.logo_url;
                        }
                    }

                    // 2. Fetch Initial Fixtures
                    await this.fetchFixtures();

                    // 3. Fetch Results & Stats
                    const { data: resData } = await _supabase.from('results').select('*').order('created_at', { ascending: false });
                    if (resData) {
                        this.results = resData;
                        this.calculateStats(resData);
                    }

                    this.loading = false;
                },

                async fetchFixtures() {
                    // This fetches fixtures specifically for the selected matchday
                    const { data, error } = await _supabase
                        .from('fixtures')
                        .select('*')
                        .eq('matchday', this.currentMatchday)
                        .order('created_at', { ascending: true });
                    
                    if (data) {
                        this.fixtures = data;
                    } else if (error) {
                        console.error("Fixture error:", error);
                    }
                },

                calculateStats(results) {
                    let gs = 0, ga = 0, bWinVal = -1, bLossVal = -1;
                    let bWinStr = 'N/A', bLossStr = 'N/A';
                    let formArr = [];

                    results.forEach(r => {
                        let isHome = r.home_name === this.userTeam;
                        let isAway = r.away_name === this.userTeam;

                        if (isHome || isAway) {
                            let myScore = isHome ? r.h_score : r.a_score;
                            let opScore = isHome ? r.a_score : r.h_score;
                            let opName = isHome ? r.away_name : r.home_name;

                            gs += myScore; ga += opScore;

                            if(formArr.length < 5) {
                                if(myScore > opScore) formArr.push('W');
                                else if(myScore === opScore) formArr.push('D');
                                else formArr.push('L');
                            }

                            if(myScore > opScore && (myScore - opScore) > bWinVal) {
                                bWinVal = myScore - opScore;
                                bWinStr = `${myScore}-${opScore} vs ${opName}`;
                            }
                            if(opScore > myScore && (opScore - myScore) > bLossVal) {
                                bLossVal = opScore - myScore;
                                bLossStr = `${myScore}-${opScore} vs ${opName}`;
                            }
                        }
                    });
                    this.userForm = formArr.reverse();
                    this.stats.totalGS = gs;
                    this.stats.totalGA = ga;
                    this.stats.biggestWin = bWinStr;
                    this.stats.biggestLoss = bLossStr;
                },

                async uploadLogo(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    const fileName = `logo-${this.userId}-${Date.now()}`;
                    const { data, error } = await _supabase.storage.from('logos').upload(fileName, file);
                    
                    if (error) {
                        alert("Upload failed: " + error.message);
                        return;
                    }

                    if (data) {
                        const url = `https://irzgzyfscoosvixwvfhx.supabase.co/storage/v1/object/public/logos/${fileName}`;
                        const { error: updateError } = await _supabase
                            .from('standings')
                            .update({ logo_url: url })
                            .eq('user_id', this.userId);
                        
                        if (!updateError) {
                            this.userProfile.logo = url;
                            location.reload();
                        }
                    }
                },

                confirmLogout() {
                    if(confirm("Terminate protocol session?")) {
                        _supabase.auth.signOut().then(() => window.location.href = 'signin.html');
                    }
                }
            }
        }
    </script>
</body>
</html>
